// ============ ÇİZİM ============
function dortgen(ax, ay, bx, cx, cy, dx2){
  ctx.beginPath();
  ctx.moveTo(ax, ay); ctx.lineTo(bx, ay);
  ctx.lineTo(dx2, cy); ctx.lineTo(cx, cy);
  ctx.closePath(); ctx.fill();
}

function ciz(){
  const o = oyun; if(!o) return;
  const G = tuval.width/devicePixelRatio, Y = tuval.height/devicePixelRatio;
  // ---- efekt katsayıları ----
  const _hzO = Math.min(1, o.hiz / 220);              // 0..1 hız yoğunluğu
  const _nit = o.nitroAktif && o.nitroDolu > 0;
  // efekt yoğunluğu: hız + nitro + kombo + sollama turbosu
  const _kmb = Math.min(0.5, (o.kombo||0)*0.055);      // kombo büyüdükçe ekran canlanır
  const _trb = (o.sollamaTurbo||0) > 0 ? 0.25 : 0;
  const eYog = _hzO * (_nit ? 1.7 : 1) * (1 + _kmb + _trb);
  // kamera sarsıntısı: hız + hasar + nitro + çarpışma
  const carpSars = (o.carpTitre||0) * 26;
  const sarsGuc = _hzO*1.3 + (o.hasar)*2.0 + (_nit?2.2:0) + carpSars;
  const _shX = (Math.random()-0.5)*sarsGuc, _shY = (Math.random()-0.5)*sarsGuc*0.7;
  ctx.save();
  ctx.translate(_shX, _shY);
  const ufuk = Y*0.34, zN = 2.2;
  const yP = z => ufuk + (Y-ufuk)*(zN/z);
  const wP = z => G*0.66*(zN/z);
  const zb = zonBlend(o.mesafe);
  const gorusEfektif = Math.max(35, Math.round(GORUS * H.gorusCarpan));

  // ---- 1) segment projeksiyonu ----
  const bazIdx = (o.mesafe/SEG)|0, frac = o.mesafe % SEG;
  let xw = 0, dxw = -egri(o.mesafe)*(frac/SEG);
  const segs = [], segArr = new Array(GORUS), ustYapi = [];
  const tabelaM = [1000,2000,3000,4000,5000].filter(m=>m < H.MESAFE-100);
  const pilonM = [Math.round(H.MESAFE*0.35/10)*10, Math.round(H.MESAFE*0.68/10)*10];
  for(let n=0; n<gorusEfektif; n++){
    const idx = bazIdx + n;
    const xwOnce = xw;
    xw += dxw; dxw += egri(idx*SEG);
    let za = n*SEG - frac, zb2 = (n+1)*SEG - frac;
    if(zb2 < zN*0.5) continue;
    za = Math.max(za, zN*0.45);
    const s = {
      idx, n, z1:za, z2:zb2,
      y1:yP(za), y2:yP(zb2), w1:wP(za), w2:wP(zb2),
      xo1:xwOnce - o.px, xo2:xw - o.px,
      fog:Math.min(1, Math.pow(n/gorusEfektif, 1.6)*1.15),
      zon:bolgeIdx(Math.max(0, Math.min(H.MESAFE-1, idx*SEG)))
    };
    s.x1 = G/2 + s.w1*s.xo1;
    s.x2 = G/2 + s.w2*s.xo2;
    segs.push(s); segArr[n] = s;
    const mAbs = idx*SEG;
    if(tabelaM.includes(mAbs)) ustYapi.push({tip:'tabela', s, m:mAbs});
    if(H.tema==='sehir' && pilonM.includes(mAbs)) ustYapi.push({tip:'pilon', s});
    if(mAbs===Math.round(H.MESAFE/SEG)*SEG) ustYapi.push({tip:'bitis', s});
  }
  const sway = xw;

  // ---- 2) gökyüzü ----
  const gok1 = H.renk.gok1, gok2 = H.renk.gok2, kenar = H.renk.kenar;
  const g1 = renkKaris(gok1[zb.a], gok1[zb.b], zb.t);
  const g2 = renkKaris(gok2[zb.a], gok2[zb.b], zb.t);
  const grad = ctx.createLinearGradient(0,0,0,ufuk);
  grad.addColorStop(0, g1); grad.addColorStop(1, g2);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, G, ufuk+1);
  if(H.tema!=='sahil'){
    for(const y of YILDIZ){
      ctx.globalAlpha = (0.3 + 0.35*Math.sin(o.sure*1.8 + y.f)) * (H.tema==='dag'?0.55:1);
      ctx.fillStyle = '#dfe8ff';
      ctx.fillRect(y.x*G, y.y*ufuk*0.85, y.r, y.r);
    }
    ctx.globalAlpha = 1;
    // ay (hilal)
    ctx.fillStyle = '#f2ead2';
    ctx.beginPath(); ctx.arc(G*0.8, ufuk*0.3, 14, 0, T2); ctx.fill();
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(G*0.8 - 6, ufuk*0.3 - 3, 12.5, 0, T2); ctx.fill();
  } else {
    // fırtına güneşi/gün batımı diski + kararan bulutlar
    const sg = ctx.createRadialGradient(G*0.78,ufuk*0.34,2, G*0.78,ufuk*0.34,26);
    sg.addColorStop(0,'rgba(255,190,120,.9)'); sg.addColorStop(1,'rgba(255,140,90,0)');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(G*0.78,ufuk*0.34,26,0,T2); ctx.fill();
    ctx.fillStyle = 'rgba(30,20,35,.55)';
    for(const b of SILUET.slice(0,10)) ctx.fillRect((srand(b.w)*G+o.sure*4)%G - 40, ufuk*0.1 + b.h*0.3, b.w*1.8, b.h*0.4);
  }
  // uzak silüet (tema: şehir binaları / çam sırtları / palmiye+iskele)
  const par = -(o.px*26 + sway*3.4);
  let sx = par - 90;
  ctx.fillStyle = H.tema==='dag' ? '#0c1512' : H.tema==='sahil' ? '#150e1a' : '#0a1120';
  for(const b of SILUET){
    if(sx < G+40){
      if(H.tema==='dag'){ // çam siluetleri (üçgen)
        ctx.beginPath(); ctx.moveTo(sx, ufuk); ctx.lineTo(sx+b.w*0.5, ufuk-b.h*1.1); ctx.lineTo(sx+b.w, ufuk); ctx.closePath(); ctx.fill();
      } else if(H.tema==='sahil'){ // palmiye/iskele siluetleri
        ctx.fillRect(sx+b.w*0.42, ufuk-b.h*0.6, b.w*0.14, b.h*0.6);
        ctx.beginPath(); ctx.ellipse(sx+b.w*0.5, ufuk-b.h*0.6, b.w*0.5, b.h*0.22, 0.3, 0, T2); ctx.fill();
      } else {
        ctx.fillRect(sx, ufuk-b.h, b.w, b.h);
      }
    }
    sx += b.w + 4;
  }
  if(H.tema==='sehir'){
    sx = par - 90;
    ctx.fillStyle = 'rgba(255,200,110,.5)';
    for(const b of SILUET){
      if(b.isik > 0.4 && sx < G+40)
        for(let p=0;p<3;p++)
          ctx.fillRect(sx+3+srand(b.w*7+p)*(b.w-7), ufuk-b.h+3+srand(b.h*11+p)*(b.h-7), 1.6, 1.6);
      sx += b.w + 4;
    }
  }
  ctx.fillStyle = 'rgba(150,190,255,.06)'; ctx.fillRect(0, ufuk-1, G, 2);
  // zemin tabanı
  ctx.fillStyle = renkKaris(kenar[zb.a][0], kenar[zb.b][0], zb.t);
  ctx.fillRect(0, ufuk, G, Y-ufuk);

  const titre = o.carpTitre>0 ? (Math.random()-0.5)*7 : 0;
  ctx.save();
  ctx.translate(titre, o.nitroAktif ? (Math.random()-0.5)*1.6 : 0);

  // ---- 3) yol + sahne (uzaktan yakına) ----
  for(let i=segs.length-1; i>=0; i--){
    const s = segs[i];
    if(s.y1 <= s.y2) continue;
    const p = ((s.idx%2)+2)%2;
    const hB = s.y1 - s.y2 + 1;
    // yol kenarı zemini
    ctx.fillStyle = renkKaris(H.renk.kenar[s.zon][p], SKY, s.fog);
    ctx.fillRect(0, s.y2, G, hB);
    if(s.zon===1 && p===0){
      ctx.fillStyle = `rgba(120,200,255,${(0.10*(1-s.fog)).toFixed(3)})`;
      ctx.fillRect(0, s.y2+hB*0.4, Math.max(0, s.x2 - s.w2*1.3), 1.5);
      ctx.fillRect(s.x2 + s.w2*1.3, s.y2+hB*0.4, G, 1.5);
    }
    // asfalt
    const asf = s.zon===2 ? ['#1d2029','#1a1d25'] : ['#262a33','#22262e'];
    ctx.fillStyle = renkKaris(asf[p], SKY, s.fog);
    dortgen(s.x1-s.w1, s.y1, s.x1+s.w1, s.x2-s.w2, s.y2, s.x2+s.w2);
    // kırmızı-beyaz bordürler
    ctx.fillStyle = renkKaris(p ? '#c8102e' : '#e8edf4', SKY, s.fog);
    dortgen(s.x1-s.w1*1.09, s.y1, s.x1-s.w1, s.x2-s.w2*1.09, s.y2, s.x2-s.w2);
    dortgen(s.x1+s.w1, s.y1, s.x1+s.w1*1.09, s.x2+s.w2, s.y2, s.x2+s.w2*1.09);
    // şerit çizgileri
    if(p===0){
      ctx.fillStyle = renkKaris('#c9d3e2', SKY, s.fog);
      ctx.globalAlpha = 0.7;
      for(const L of [-0.5, 0, 0.5])
        dortgen(s.x1+s.w1*(L-0.011), s.y1, s.x1+s.w1*(L+0.011),
                s.x2+s.w2*(L-0.011), s.y2, s.x2+s.w2*(L+0.011));
      ctx.globalAlpha = 1;
    }
    // başlangıç / bitiş damalı zemin
    if(s.idx <= 1 || (s.idx >= H.TOPLAM_SEG-2 && s.idx < H.TOPLAM_SEG)){
      for(let q=0;q<12;q++){
        ctx.fillStyle = (q+s.idx)%2 ? '#e8e8e8' : '#161616';
        ctx.globalAlpha = 1 - s.fog;
        const xa = s.x1-s.w1 + (2*s.w1)*q/12;
        ctx.fillRect(xa, s.y2, (2*s.w1)/12 + 0.5, hB);
      }
      ctx.globalAlpha = 1;
    }
    sahne(s, p, G, o);
  }

  // ---- 4) araçlar (uzaktan yakına) ----
  // far ışığı: oyuncunun önündeki yola vuran koni
  {
    const lgx = G/2 + o.lean*9;
    const tepeY = ufuk + 46;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const bw = Math.max(130, Math.min(G*0.44, 230));
    ctx.beginPath();
    ctx.moveTo(lgx - bw*0.9, Y*0.96);
    ctx.lineTo(lgx + bw*0.9, Y*0.96);
    ctx.lineTo(G/2 + 24, tepeY);
    ctx.lineTo(G/2 - 24, tepeY);
    ctx.closePath();
    const beamGrad = ctx.createLinearGradient(0, Y*0.96, 0, tepeY);
    beamGrad.addColorStop(0, 'rgba(255,244,214,.20)');
    beamGrad.addColorStop(0.5, 'rgba(255,238,190,.07)');
    beamGrad.addColorStop(1, 'rgba(255,230,170,0)');
    ctx.fillStyle = beamGrad; ctx.fill();
    ctx.restore();
  }
  const araclar = [];
  for(const tr of o.trafik) araclar.push({z:tr.z, x:tr.x, model:tr.model, renk:tr.renk});
  for(const h of o.hayaletler) araclar.push({z:h.mesafe, x:h.lat, model:h.model, renk:h.renk, hayalet:true, isim:h.isim});
  araclar.sort((a,b)=>b.z-a.z);
  for(const a of araclar){
    const n = Math.floor(a.z/SEG) - bazIdx;
    if(n<0 || n>=GORUS) continue;
    const s = segArr[n]; if(!s) continue;
    const t = Math.max(0, Math.min(1, (a.z - o.mesafe - s.z1)/(s.z2 - s.z1)));
    const y = s.y1 + (s.y2-s.y1)*t;
    const w = s.w1 + (s.w2-s.w1)*t;
    const xc = s.x1 + (s.x2-s.x1)*t;
    const mg = (MODEL_GORUNUM[a.model]||MODEL_GORUNUM.generic).gen;
    // yol yarı-genişliği w → tam yol 2w → bir şerit = 2w/4 = w/2
    // araba bir şeritten biraz dar olsun: şerit*0.78
    const wcar = (w/2)*0.95*mg;
    if(wcar < 4) continue;
    if(a.hayalet){
      ctx.globalAlpha = 0.55;
      aracArka(xc + w*a.x, y, wcar, {renk:a.renk, model:a.model});
      ctx.globalAlpha = 1;
      if(wcar > 26){
        ctx.fillStyle = a.renk; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(a.isim, xc + w*a.x, y - wcar*0.75);
      }
    } else {
      aracArka(xc + w*a.x, y, wcar, {renk:a.renk, model:a.model});
    }
  }

  // ---- 5) üst yapılar (tabelalar, köprü pilonları, bitiş kapısı) ----
  for(const u of ustYapi) ustCiz(u, o, G);

  // ---- 6) oyuncu arabası ----
  // Trafikle AYNI oran: bir şerit = yolW/4, araba = şerit*0.78 (modele göre çarpan)
  const onSeg = segs.length ? segs[0] : null;
  const yolW = onSeg ? onSeg.w1 * 2 : G*0.66;   // ekrandaki tam yol genişliği (px)
  const seritW = yolW / 4;                       // bir şeridin px genişliği
  const oyMg = (MODEL_GORUNUM[profil.secili]||MODEL_GORUNUM.generic).gen;
  const oyW = Math.max(68, Math.min(seritW * 0.95 * oyMg, G*0.38));
  ctx.save();
  ctx.translate(G/2 + o.lean*9, Y*0.93);
  ctx.rotate(o.lean*0.045);
  // parçacıklar (araba altı/arkası referanslı, ekran uzayında)
  for(const p of o.parcaciklar){
    const px = p.tip==='kivilcim' && p.taraf ? p.taraf*oyW*0.5 + p.x : p.x;
    const py = -oyW*0.12 + p.y;
    if(p.tip==='duman'){
      const a = Math.max(0, p.omur/0.9);
      ctx.fillStyle = `rgba(180,185,195,${(a*0.5).toFixed(2)})`;
      ctx.beginPath(); ctx.arc(px, py, p.boy*(1.4-a), 0, T2); ctx.fill();
    } else {
      ctx.globalAlpha = Math.max(0, Math.min(1, p.omur/0.4));
      ctx.fillStyle = p.renk;
      ctx.fillRect(px-p.boy/2, py-p.boy/2, p.boy, p.boy);
      ctx.globalAlpha = 1;
    }
  }
  aracArka(0, 0, oyW, {
    renk: profil.arabalar[profil.secili].renk,
    model: profil.secili,
    mod: modToplam(profil.secili),
    oyuncu: true,
    nitro: o.nitroAktif,
    fren: o.carpTitre > 0,
    hasar: o.hasar
  });
  ctx.restore();
  ctx.restore();

  // ---- TAM EKRAN NITRO PATLAMASI ----
  if(o.nitroFlash > 0.01){
    const nf = o.nitroFlash;
    const rg = ctx.createRadialGradient(G/2, Y*0.5, Y*0.15, G/2, Y*0.5, Y*0.75);
    rg.addColorStop(0, 'rgba(46,230,200,0)');
    rg.addColorStop(1, `rgba(46,230,200,${(0.22*nf).toFixed(2)})`);
    ctx.fillStyle = rg; ctx.fillRect(0,0,G,Y);
    // hız çizgileri (radyal)
    ctx.strokeStyle = `rgba(200,255,248,${(0.5*nf).toFixed(2)})`; ctx.lineWidth = 2;
    const t = o.sure*30;
    for(let i=0;i<14;i++){
      const a = (i/14)*T2 + t*0.05;
      const r1 = Y*0.3, r2 = Y*0.3 + 40 + (t*4 % 60);
      ctx.beginPath();
      ctx.moveTo(G/2+Math.cos(a)*r1, Y*0.5+Math.sin(a)*r1);
      ctx.lineTo(G/2+Math.cos(a)*r2, Y*0.5+Math.sin(a)*r2);
      ctx.stroke();
    }
  }

  // atmosfer: tünel (şehir) / sisli geçit (dağ) / fırtına şeridi (sahil)
  const zon2T = (zb.a===2?1:0)*(1-zb.t) + (zb.b===2?1:0)*zb.t;
  if(H.tema==='sehir' && zon2T > 0.01){
    ctx.fillStyle = `rgba(3,3,8,${(0.26*zon2T).toFixed(3)})`; ctx.fillRect(0,0,G,Y);
    ctx.fillStyle = `rgba(255,140,50,${(0.05*zon2T).toFixed(3)})`; ctx.fillRect(0,0,G,Y);
  } else if(H.tema==='dag'){
    // sürekli hafif sis + sisli geçitte yoğunlaşma
    ctx.fillStyle = `rgba(180,190,200,${(0.05+0.22*zon2T).toFixed(3)})`; ctx.fillRect(0,0,G,Y);
  } else if(H.tema==='sahil' && zon2T > 0.01){
    ctx.fillStyle = `rgba(20,10,28,${(0.24*zon2T).toFixed(3)})`; ctx.fillRect(0,0,G,Y);
  }
  // yağmur + şimşek (sahil)
  if(H.hava==='yagmur'){
    if(o.simsekSure > 0){
      ctx.fillStyle = `rgba(230,238,255,${(0.35*(o.simsekSure/0.14)).toFixed(2)})`;
      ctx.fillRect(0,0,G,Y);
    }
    ctx.strokeStyle = 'rgba(210,225,245,.35)'; ctx.lineWidth = 1.4;
    const ruzgar = 26;
    for(const dm of o.yagmur){
      const rx = dm.x*G + ruzgar*dm.y, ry = dm.y*Y;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-ruzgar*0.28, ry+dm.boy); ctx.stroke();
    }
    // ıslak yol parıltısı
    ctx.fillStyle = `rgba(180,210,255,${(0.05+0.03*Math.sin(o.sure*3)).toFixed(3)})`;
    ctx.fillRect(0, ufuk, G, Y-ufuk);
  }
  // hasar göstergesi: motor titremesi/kıvılcım parıltısı yüksek hasarda
  if(o.hasar > 0.5){
    ctx.fillStyle = `rgba(255,80,40,${(0.04+0.05*Math.sin(o.sure*14)).toFixed(3)})`;
    ctx.fillRect(0,0,G,Y);
  }
  // bölge duyurusu
  if(o.bolgeSure > 0){
    ctx.globalAlpha = Math.min(1, o.bolgeSure);
    ctx.fillStyle = '#ffb02e'; ctx.font = 'italic 900 21px sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
    ctx.fillText(o.bolgeYazi, G/2, Y*0.15);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  // rota haritası (sağ kenar)
  const pbX = G-20, pbY0 = Y*0.12, pbH = Y*0.55;
  const bolgeRenk = ['#3a4152','#2b4f6b','#6b4620','#3a4152'];
  const snr = [0, ...H.sinirlar, H.MESAFE];
  for(let i=0;i<4;i++){
    ctx.fillStyle = bolgeRenk[i];
    ctx.fillRect(pbX, pbY0 + pbH*(1-snr[i+1]/H.MESAFE), 8, pbH*(snr[i+1]-snr[i])/H.MESAFE);
  }
  for(let i=0;i<3;i++){
    ctx.fillStyle = i%2 ? '#111':'#eee';
    ctx.fillRect(pbX + i*2.7, pbY0-4, 2.7, 4);
  }
  for(const h of o.hayaletler){
    ctx.fillStyle = h.renk;
    ctx.beginPath(); ctx.arc(pbX+4, pbY0 + pbH*(1-h.mesafe/H.MESAFE), 4, 0, T2); ctx.fill();
  }
  ctx.fillStyle = '#ffb02e'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(pbX+4, pbY0 + pbH*(1-o.mesafe/H.MESAFE), 6.5, 0, T2); ctx.fill(); ctx.stroke();

  // ---- VİRAJ UYARI OKU ----
  const ilerEgri = egri(o.mesafe + 120);
  if(Math.abs(ilerEgri) > 0.0016){
    const sag = ilerEgri > 0;
    const ax = G/2, ay = Y*0.30, blink = 0.55 + 0.45*Math.sin(o.sure*8);
    ctx.globalAlpha = Math.min(1, (Math.abs(ilerEgri)-0.0016)*380) * blink;
    ctx.fillStyle = '#ffb02e';
    for(let k=0;k<3;k++){
      const ox = ax + (sag?1:-1)*(k*20 - 20);
      ctx.beginPath();
      ctx.moveTo(ox + (sag?-9:9), ay-11);
      ctx.lineTo(ox + (sag?9:-9), ay);
      ctx.lineTo(ox + (sag?-9:9), ay+11);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ---- SOLLAMA YAZISI ----
  if(o.sonGeecti > 0){
    ctx.globalAlpha = Math.min(1, o.sonGeecti*2);
    ctx.fillStyle = '#2ee6c8'; ctx.font = 'italic 800 17px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('SOLLAMA! +hız', G/2, Y*0.42);
    ctx.globalAlpha = 1;
  }
  // ---- SIRA DEĞİŞİMİ TOAST ----
  if(o.siraToastSure > 0){
    const a = Math.min(1, o.siraToastSure*1.6);
    const yy = Y*0.24 - Math.min(1,(1.8-o.siraToastSure)*6)*4;
    ctx.globalAlpha = a;
    ctx.font = '900 16px sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
    ctx.fillStyle = o.siraToastRenk;
    ctx.fillText(o.siraToastYazi, G/2, yy);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  // ---- SOLLAMA TURBO GÖSTERGESİ ----
  if(o.turboToast > 0){
    const a = Math.min(1, o.turboToast/0.35);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = '900 20px sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = '#ffb02e'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffd47a';
    ctx.fillText('⚡ TURBO!', G/2, Y*0.36 - (0.7-o.turboToast)*22);
    ctx.restore();
  }

  // ---- KOMBO SAYACI (sol üst, HUD altı) ----
  if((o.kombo||0) >= 2){
    const kx = 16, ky = Y*0.30;
    const fl = Math.min(1, (o.komboFlash||0)*2);
    const buyu = 1 + fl*0.28;
    // kombo rengi: yükseldikçe sarı→turuncu→kırmızı
    const kr = o.kombo>=8 ? '#ff4d5e' : o.kombo>=5 ? '#ff8a3a' : '#ffb02e';
    ctx.save();
    ctx.translate(kx, ky);
    ctx.scale(buyu, buyu);
    ctx.textAlign = 'left';
    ctx.shadowColor = kr; ctx.shadowBlur = 10 + fl*18;
    ctx.fillStyle = kr;
    ctx.font = '900 26px sans-serif';
    ctx.fillText(`x${o.kombo}`, 0, 0);
    ctx.font = '800 10px sans-serif';
    ctx.shadowBlur = 4;
    ctx.fillText('KOMBO', 1, 12);
    // kombo süre çubuğu (kaçıyor hissi)
    const cw = 46, oran = Math.max(0, Math.min(1, (o.komboSure||0)/7.0));
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(0, 17, cw, 3);
    ctx.fillStyle = kr;
    ctx.fillRect(0, 17, cw*oran, 3);
    ctx.restore();
  }

  // ---- YAKIN GEÇİŞ! ----
  if((o.yakinToast||0) > 0){
    const a = Math.min(1, o.yakinToast/0.4);
    ctx.save();
    ctx.globalAlpha = a; ctx.textAlign = 'center';
    ctx.font = '900 17px sans-serif';
    ctx.shadowColor = '#2ee6c8'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#7dffe8';
    ctx.fillText('😱 KIL PAYI! +NİTRO', G/2, Y*0.44 - (0.8-o.yakinToast)*16);
    ctx.restore();
  }

  // ---- TEMİZ SÜRÜŞ ----
  if((o.temizToast||0) > 0){
    const a = Math.min(1, o.temizToast/0.4);
    ctx.save();
    ctx.globalAlpha = a; ctx.textAlign = 'center';
    ctx.font = '900 15px sans-serif';
    ctx.shadowColor = '#2ee6c8'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#8affd8';
    ctx.fillText('✨ TEMİZ SÜRÜŞ +14 NİTRO', G/2, Y*0.50);
    ctx.restore();
  }
  // turbo süresince ekran kenarı turuncu parıltı
  if((o.sollamaTurbo||0) > 0){
    const tg = ctx.createRadialGradient(G/2, Y*0.6, Y*0.30, G/2, Y*0.6, Y*0.75);
    tg.addColorStop(0,'rgba(0,0,0,0)');
    tg.addColorStop(1,`rgba(255,176,46,${Math.min(0.18, o.sollamaTurbo*0.14)})`);
    ctx.fillStyle = tg; ctx.fillRect(0,0,G,Y);
  }

  // ---- DİREKSİYON GÖSTERGESİ (sol alt) ----
  const dX = 52, dY = Y - 54, dR = 30;
  ctx.save();
  ctx.translate(dX, dY);
  ctx.globalAlpha = 0.9;
  ctx.rotate(o.lean * 0.6);
  ctx.strokeStyle = '#2a3142'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(0,0,dR,0,T2); ctx.stroke();
  ctx.strokeStyle = '#5b6270'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0,0,dR,0,T2); ctx.stroke();
  ctx.strokeStyle = '#e8ecf4'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(-dR,0); ctx.lineTo(dR,0);
  ctx.moveTo(0,0); ctx.lineTo(0,dR); ctx.stroke();
  ctx.fillStyle = '#ffb02e';
  ctx.beginPath(); ctx.arc(0,-dR,4,0,T2); ctx.fill();
  ctx.fillStyle = '#1e2430';
  ctx.beginPath(); ctx.arc(0,0,7,0,T2); ctx.fill();
  ctx.restore();

  // ========== EFEKT KATMANLARI ==========
  // 1) FAR IŞIĞI — yol yüzeyine düşen, öne doğru daralan ışık havuzu
  const karanlik = (H.tema!=='sahil') || zb.a>=2;
  if(karanlik){
    const fx = G/2 - (o.px||0)*G*0.18;
    const yAlt = Y*0.86, yUst = ufuk + (Y-ufuk)*0.30;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const fg = ctx.createLinearGradient(0, yAlt, 0, yUst);
    fg.addColorStop(0, 'rgba(255,246,220,.20)');
    fg.addColorStop(0.5, 'rgba(255,240,200,.09)');
    fg.addColorStop(1, 'rgba(255,238,190,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(fx-G*0.16, yAlt);
    ctx.lineTo(fx-G*0.055, yUst);
    ctx.lineTo(fx+G*0.055, yUst);
    ctx.lineTo(fx+G*0.16, yAlt);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // 2) HIZ ÇİZGİLERİ — kenarlardan geriye akan hız hissi
  if(eYog > 0.22){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const adet = Math.round(10 + eYog*22);
    const t = performance.now()/1000;
    for(let i=0;i<adet;i++){
      const rnd = (i*0.618)%1;
      const yon = i%2 ? 1 : -1;
      const ilerle = ((t*(1.2+eYog*2.6) + rnd)%1);
      const yy = ufuk + (Y-ufuk)*Math.pow(ilerle, 0.45);
      const yayil = Math.pow(ilerle, 1.5);
      const xx = G/2 + yon*(G*0.10 + G*0.62*yayil) + (rnd-0.5)*G*0.18;
      const uz = 8 + yayil*70*eYog;
      const alfa = Math.min(0.5, 0.05 + yayil*0.42*eYog) * (_nit?1.3:0.85);
      const gr = ctx.createLinearGradient(xx, yy-uz, xx, yy);
      const rk = _nit ? '46,230,200' : '190,215,255';
      gr.addColorStop(0, `rgba(${rk},0)`);
      gr.addColorStop(1, `rgba(${rk},${alfa})`);
      ctx.strokeStyle = gr;
      ctx.lineWidth = (_nit?2.1:1.4) * (0.5+yayil);
      ctx.beginPath(); ctx.moveTo(xx, yy-uz); ctx.lineTo(xx, yy); ctx.stroke();
    }
    ctx.restore();
  }

  // 3) NİTRO TÜNELİ — merkeze doğru akan hafif ışık halkaları
  if(_nit){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const t = performance.now()/1000;
    for(let i=0;i<4;i++){
      const p = ((t*2.2 + i*0.25)%1);
      const r = Math.pow(p,0.7) * Math.max(G,Y)*0.62;
      ctx.strokeStyle = `rgba(46,230,200,${(1-p)*0.085})`;
      ctx.lineWidth = 1.5 + (1-p)*2.5;
      ctx.beginPath(); ctx.arc(G/2, ufuk+Y*0.16, r, 0, T2); ctx.stroke();
    }
    // merkez parlama (hafif)
    const ng = ctx.createRadialGradient(G/2, ufuk+Y*0.10, 0, G/2, ufuk+Y*0.10, G*0.36);
    ng.addColorStop(0,'rgba(120,255,238,.10)');
    ng.addColorStop(1,'rgba(46,230,200,0)');
    ctx.fillStyle = ng; ctx.fillRect(0,0,G,Y);
    ctx.restore();
  }

  // 4) KENAR BULANIKLIĞI (motion blur taklidi) — hızda kenarları karart
  if(eYog > 0.3){
    const bg = ctx.createLinearGradient(0,0,G,0);
    const bl = Math.min(0.42, eYog*0.36);
    bg.addColorStop(0, `rgba(4,7,14,${bl})`);
    bg.addColorStop(0.22, 'rgba(4,7,14,0)');
    bg.addColorStop(0.78, 'rgba(4,7,14,0)');
    bg.addColorStop(1, `rgba(4,7,14,${bl})`);
    ctx.fillStyle = bg; ctx.fillRect(0,0,G,Y);
  }

  // 5) VİNYET + hasar kızarması
  const vg = ctx.createRadialGradient(G/2, Y*0.52, Y*0.28, G/2, Y*0.52, Y*0.82);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,`rgba(0,0,0,${0.34 + eYog*0.14})`);
  ctx.fillStyle = vg; ctx.fillRect(0,0,G,Y);
  if(o.hasar > 0.35){
    const hg = ctx.createRadialGradient(G/2, Y*0.5, Y*0.22, G/2, Y*0.5, Y*0.8);
    hg.addColorStop(0,'rgba(0,0,0,0)');
    hg.addColorStop(1,`rgba(190,20,32,${(o.hasar-0.35)*0.5})`);
    ctx.fillStyle = hg; ctx.fillRect(0,0,G,Y);
  }
  ctx.restore(); // kamera sarsıntısını bitir (HUD sabit kalsın)

  // ---- HIZ KADRANI (sağ alt) ----
  const kX = G - 52, kY = Y - 54, kR = 30;
  const oran = Math.min(1, o.hiz/(o.st.hiz/3.6));
  ctx.save();
  ctx.translate(kX, kY);
  ctx.globalAlpha = 0.92;
  ctx.strokeStyle = '#1e2430'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(0,0,kR, Math.PI*0.75, Math.PI*2.25); ctx.stroke();
  // dolum yayı (yeşil→sarı→kırmızı)
  const ac = Math.PI*0.75 + oran*Math.PI*1.5;
  ctx.strokeStyle = oran>0.85 ? '#ff4d5e' : oran>0.6 ? '#ffb02e' : '#2ee6c8';
  ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0,0,kR, Math.PI*0.75, ac); ctx.stroke();
  ctx.lineCap = 'butt';
  // ibre
  ctx.rotate(Math.PI*0.75 + oran*Math.PI*1.5);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(kR-6,0); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#e8ecf4'; ctx.font = '800 13px sans-serif'; ctx.textAlign = 'center';
  ctx.globalAlpha = 0.92;
  ctx.fillText(Math.round(o.hiz*3.6), kX, kY+4);
  ctx.fillStyle = 'var(--muted)'; ctx.fillStyle = '#8b94a8'; ctx.font = '600 8px sans-serif';
  ctx.fillText('km/s', kX, kY+13);
  ctx.globalAlpha = 1;

  // HUD (üst köşeler)
  const toplamYarisci = o.hayaletler.length + 1;
  const siraRenk = o.sira===1 ? '#ffb02e' : o.sira===toplamYarisci ? '#ff4d5e' : '#e8ecf4';
  const hasarYazi = o.hasar > 0.03 ? `<br><span style="color:${o.hasar>0.6?'#ff4d5e':'#ff8a3a'};font-size:11px;">🔧 HASAR ${Math.round(o.hasar*100)}%</span>` : '';
  $('hudSol').innerHTML = `<span style="color:${siraRenk};font-size:15px;">SIRA ${o.sira}/${toplamYarisci}</span><br>⏱ ${sureYaz(o.sure)}<br><span style="color:var(--muted);font-size:12px;">${Math.round(o.mesafe)} / ${H.MESAFE} m</span>${hasarYazi}`;
  $('hudSag').innerHTML = `<span style="font-size:22px;color:var(--amber);">${Math.round(o.hiz*3.6)}</span> <span style="font-size:11px;">km/s</span><br>
    <span style="color:var(--teal);font-size:12px;">NİTRO ${Math.round(o.nitroDolu)}%</span>`;
}

// bölgelere göre yol kenarı sahneleri
function sahne(s, p, G, o){
  if(H.tema==='dag') return sahneDag(s,p,G,o);
  if(H.tema==='sahil') return sahneSahil(s,p,G,o);
  return sahneSehir(s,p,G,o);
}
function sahneSehir(s, p, G, o){
  const {zon, idx, x2, y2, w2, fog} = s;
  const F = 1 - fog;
  if(zon===0 || zon===3){
    if(idx%6===2){
      const side = (idx%12===2) ? -1 : 1;
      const bw = w2*(0.8 + srand(idx*3)*0.9), bh = w2*(2.1 + srand(idx*5)*2.8);
      const bx = x2 + w2*side*(1.95 + srand(idx*7)*1.1);
      ctx.fillStyle = renkKaris(['#131a28','#0f1522','#182134'][idx%3], SKY, fog);
      ctx.fillRect(bx-bw/2, y2-bh, bw, bh);
      if(w2 > 13){
        ctx.fillStyle = `rgba(255,195,100,${(0.75*F).toFixed(2)})`;
        for(let q=0;q<4;q++)
          ctx.fillRect(bx-bw/2+2+srand(idx*11+q)*(bw-5), y2-bh+3+srand(idx*13+q)*(bh-8),
                       Math.max(1.4,bw*0.07), Math.max(1.4,bw*0.07));
        ctx.strokeStyle = renkKaris('#2a3142', SKY, fog); ctx.lineWidth = Math.max(1,w2*0.02);
        ctx.beginPath(); ctx.moveTo(bx, y2-bh); ctx.lineTo(bx, y2-bh-w2*0.4); ctx.stroke();
      }
    }
    if(idx%9===5){
      const side = (idx%18===5) ? -1 : 1;
      const px2 = x2 + w2*side*1.34, boy = w2*2.0;
      ctx.strokeStyle = renkKaris('#3a4152', SKY, fog); ctx.lineWidth = Math.max(1, w2*0.035);
      ctx.beginPath();
      ctx.moveTo(px2, y2); ctx.lineTo(px2, y2-boy); ctx.lineTo(px2 - side*w2*0.5, y2-boy);
      ctx.stroke();
      ctx.fillStyle = `rgba(255,220,140,${(0.9*F).toFixed(2)})`;
      ctx.beginPath(); ctx.arc(px2 - side*w2*0.5, y2-boy, Math.max(1.5, w2*0.07), 0, T2); ctx.fill();
      ctx.fillStyle = `rgba(255,205,110,${(0.07*F).toFixed(3)})`;
      ctx.beginPath(); ctx.ellipse(px2 - side*w2*0.55, y2, w2*0.8, w2*0.16, 0, 0, T2); ctx.fill();
    }
    if(zon===3){
      if(idx%4===1){
        for(const side of [-1,1]){
          const bx = x2 + w2*side*2.1, bw = w2*1.5, bh = w2*1.05;
          ctx.fillStyle = renkKaris('#1a2130', SKY, fog);
          ctx.fillRect(bx-bw/2, y2-bh, bw, bh);
          if(w2 > 15){
            const renkler = ['#e63946','#ffb02e','#2ee6c8','#4d7cff','#c084fc','#f2f2f2'];
            ctx.globalAlpha = 0.9*F;
            for(let q=0;q<8;q++){
              ctx.fillStyle = renkler[(idx+q)%6];
              ctx.fillRect(bx-bw/2+1+srand(idx*17+q)*(bw-3), y2-bh+2+srand(idx*19+q)*(bh-4), 2, 2);
            }
            ctx.globalAlpha = 1;
          }
        }
      }
      if(idx%8===3){
        const side = (idx%16===3) ? -1 : 1;
        const px2 = x2 + w2*side*1.5, boy = w2*1.6;
        ctx.strokeStyle = renkKaris('#6b7385', SKY, fog); ctx.lineWidth = Math.max(1, w2*0.03);
        ctx.beginPath(); ctx.moveTo(px2, y2); ctx.lineTo(px2, y2-boy); ctx.stroke();
        ctx.fillStyle = ['#e63946','#ffb02e','#2ee6c8'][idx%3];
        ctx.globalAlpha = 0.9*F;
        ctx.beginPath();
        ctx.moveTo(px2, y2-boy);
        ctx.lineTo(px2 + side*w2*0.5, y2-boy+w2*0.16);
        ctx.lineTo(px2, y2-boy+w2*0.32);
        ctx.fill(); ctx.globalAlpha = 1;
      }
    }
  }
  else if(zon===1){
    ctx.fillStyle = renkKaris('#5b6270', SKY, fog);
    ctx.fillRect(x2 - w2*1.16, y2 - w2*0.22, Math.max(1.3, w2*0.045), w2*0.22);
    ctx.fillRect(x2 + w2*1.12, y2 - w2*0.22, Math.max(1.3, w2*0.045), w2*0.22);
    if(idx%2===0){
      const mA = idx*SEG, mid=H.MESAFE*0.5, d = Math.min(Math.abs(mA-mid*0.7), Math.abs(mA-mid*1.22));
      const askH = w2*(0.35 + Math.min(3.4, d*d*0.0000042));
      ctx.strokeStyle = `rgba(200,220,255,${(0.4*F).toFixed(2)})`;
      ctx.lineWidth = Math.max(0.8, w2*0.02);
      ctx.beginPath();
      ctx.moveTo(x2 - w2*1.14, y2 - w2*0.2); ctx.lineTo(x2 - w2*1.14, y2 - w2*0.2 - askH);
      ctx.moveTo(x2 + w2*1.14, y2 - w2*0.2); ctx.lineTo(x2 + w2*1.14, y2 - w2*0.2 - askH);
      ctx.stroke();
    }
  }
  else if(zon===2){
    const cy2 = y2 - w2*1.5, cy1 = s.y1 - s.w1*1.5;
    const yTop = Math.min(cy1, cy2), hC = Math.abs(cy1 - cy2);
    ctx.fillStyle = renkKaris('#07080d', SKY, fog*0.6);
    ctx.fillRect(0, yTop, G, hC + 1);
    if(p===0){
      ctx.fillStyle = `rgba(255,255,255,${(0.05*F).toFixed(3)})`;
      ctx.fillRect(0, y2 - w2*0.6, Math.max(0, x2 - w2*1.05), 1.2);
      ctx.fillRect(x2 + w2*1.05, y2 - w2*0.6, G, 1.2);
    }
    if(idx%5===0){
      ctx.fillStyle = `rgba(255,180,90,${(0.8*F).toFixed(2)})`;
      ctx.fillRect(x2 - w2*1.12, y2 - w2*0.8, Math.max(1.5,w2*0.07), Math.max(1.5,w2*0.05));
      ctx.fillRect(x2 + w2*1.05, y2 - w2*0.8, Math.max(1.5,w2*0.07), Math.max(1.5,w2*0.05));
    }
    if(idx%6===0){
      ctx.fillStyle = `rgba(255,214,160,${(0.9*F).toFixed(2)})`;
      ctx.fillRect(x2 - w2*0.55, cy2, w2*1.1, Math.max(1.6, w2*0.07));
      ctx.fillStyle = `rgba(255,200,120,${(0.10*F).toFixed(3)})`;
      ctx.fillRect(x2 - w2*0.7, cy2, w2*1.4, w2*0.9);
    }
  }
}

// ---- DAĞ TEMASI: çam ormanı, uçurum korkuluğu, sisli kaya geçidi ----
function sahneDag(s, p, G, o){
  const {zon, idx, x2, y2, w2, fog} = s;
  const F = 1 - fog;
  const cam = (side)=>{
    const bx = x2 + w2*side*(1.5 + srand(idx*7+side*3)*0.9);
    const bh = w2*(1.6 + srand(idx*5+side)*1.6), bw = w2*0.9;
    ctx.fillStyle = renkKaris('#0f2418', SKY, fog);
    ctx.beginPath();
    ctx.moveTo(bx, y2); ctx.lineTo(bx-bw*0.5, y2-bh*0.55); ctx.lineTo(bx, y2-bh); ctx.lineTo(bx+bw*0.5, y2-bh*0.55);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = renkKaris('#173420', SKY, fog);
    ctx.beginPath();
    ctx.moveTo(bx, y2-bh*0.35); ctx.lineTo(bx-bw*0.32, y2-bh*0.72); ctx.lineTo(bx, y2-bh*1.02); ctx.lineTo(bx+bw*0.32, y2-bh*0.72);
    ctx.closePath(); ctx.fill();
  };
  if(zon===0 || zon===3){
    if(idx%3===0) cam(-1);
    if(idx%3===1) cam(1);
    if(zon===3 && idx%7===2){
      ctx.fillStyle = renkKaris('#5b6270', SKY, fog);
      ctx.fillRect(x2-w2*1.15, y2-w2*0.5, Math.max(1.2,w2*0.04), w2*0.5);
      ctx.fillRect(x2+w2*1.11, y2-w2*0.5, Math.max(1.2,w2*0.04), w2*0.5);
    }
  } else if(zon===1){
    // uçurum kenarı: bir yanda korkuluk + boşluk, diğer yanda kaya duvarı
    ctx.fillStyle = renkKaris('#05070a', SKY, fog*0.7);
    ctx.fillRect(0, y2-w2*0.02, x2-w2*1.02, w2*3);
    ctx.strokeStyle = renkKaris('#c8d3e0', SKY, fog); ctx.lineWidth = Math.max(1, w2*0.03);
    ctx.beginPath(); ctx.moveTo(x2-w2*1.05, y2-w2*0.24); ctx.lineTo(x2-w2*1.05, y2); ctx.stroke();
    if(idx%2===0){
      ctx.fillStyle = idx%4===0 ? '#e04050' : '#e2e8f0';
      ctx.fillRect(x2-w2*1.08, y2-w2*0.24, Math.max(1,w2*0.06), w2*0.24);
    }
    // sağda kaya duvarı
    const bh = w2*(1.4+srand(idx*9)*1.4);
    ctx.fillStyle = renkKaris('#241d1a', SKY, fog);
    ctx.fillRect(x2+w2*1.02, y2-bh, w2*1.6, bh);
    ctx.fillStyle = renkKaris('#332a24', SKY, fog);
    for(let q=0;q<3;q++) ctx.fillRect(x2+w2*1.05+q*w2*0.5, y2-bh*(0.3+srand(idx+q)*0.5), w2*0.35, w2*0.25);
  } else if(zon===2){
    // sisli geçit: yoğun sis perdesi + belli belirsiz kaya
    const camF = Math.min(1, fog*1.6+0.28);
    ctx.fillStyle = `rgba(200,208,220,${(0.5*camF).toFixed(2)})`;
    ctx.fillRect(0, s.y1-200, G, 300);
    if(idx%4===0){
      ctx.fillStyle = renkKaris('#1b1712', SKY, Math.min(1,fog+0.3));
      ctx.beginPath(); ctx.ellipse(x2 - w2*1.3, y2-w2*0.3, w2*0.6, w2*1.1, 0,0,T2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x2 + w2*1.3, y2-w2*0.3, w2*0.6, w2*1.1, 0,0,T2); ctx.fill();
    }
  }
}

// ---- SAHİL TEMASI: palmiye bulvarı, marina, fırtına şeridi, kumsal ----
function sahneSahil(s, p, G, o){
  const {zon, idx, x2, y2, w2, fog} = s;
  const F = 1 - fog;
  const palmiye = (side)=>{
    const bx = x2 + w2*side*(1.6 + srand(idx*7+side*3)*0.8);
    const govdeH = w2*(1.5+srand(idx*5+side)*0.9);
    ctx.strokeStyle = renkKaris('#3a2a1c', SKY, fog); ctx.lineWidth = Math.max(1, w2*0.045);
    ctx.beginPath(); ctx.moveTo(bx, y2); ctx.quadraticCurveTo(bx+side*w2*0.2, y2-govdeH*0.6, bx+side*w2*0.1, y2-govdeH); ctx.stroke();
    ctx.fillStyle = renkKaris('#1c3a1e', SKY, fog);
    const tx = bx+side*w2*0.1, ty = y2-govdeH;
    for(let k=0;k<5;k++){
      const a = k*T2/5;
      ctx.beginPath(); ctx.ellipse(tx+Math.cos(a)*w2*0.4, ty+Math.sin(a)*w2*0.2, w2*0.45, w2*0.14, a, 0, T2); ctx.fill();
    }
  };
  if(zon===0){
    if(idx%4===0) palmiye(-1);
    if(idx%4===2) palmiye(1);
    if(idx%9===5){
      const side = idx%18===5?-1:1;
      const px2 = x2+w2*side*1.3, boy=w2*1.8;
      ctx.strokeStyle = renkKaris('#4a3826', SKY, fog); ctx.lineWidth = Math.max(1,w2*0.03);
      ctx.beginPath(); ctx.moveTo(px2,y2); ctx.lineTo(px2,y2-boy); ctx.stroke();
      ctx.fillStyle = `rgba(255,225,180,${(0.85*F).toFixed(2)})`;
      ctx.beginPath(); ctx.arc(px2, y2-boy, Math.max(1.4,w2*0.06),0,T2); ctx.fill();
    }
  } else if(zon===1){
    // marina: iskele + tekne siluetleri + su
    ctx.fillStyle = renkKaris('#0a2436', SKY, fog);
    ctx.fillRect(0, y2-w2*0.15, G, w2*0.15);
    if(idx%5===0){
      const side = idx%10===0?-1:1;
      const bx = x2+w2*side*1.7, bw=w2*1.3, bh=w2*0.5;
      ctx.fillStyle = renkKaris('#1a2a34', SKY, fog);
      ctx.beginPath();
      ctx.moveTo(bx-bw/2, y2); ctx.lineTo(bx+bw/2, y2); ctx.lineTo(bx+bw*0.32, y2-bh); ctx.lineTo(bx-bw*0.2, y2-bh);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = renkKaris('#3a4a56', SKY, fog); ctx.lineWidth = Math.max(1,w2*0.025);
      ctx.beginPath(); ctx.moveTo(bx, y2-bh); ctx.lineTo(bx, y2-bh*2.1); ctx.stroke();
    }
  } else if(zon===2){
    // fırtına şeridi: eğik uyarı tabelaları + rüzgarlı siluetler
    if(idx%6===0){
      const side = idx%12===0?-1:1;
      const px2 = x2+w2*side*1.25, boy=w2*1.3;
      ctx.strokeStyle = renkKaris('#4a4652', SKY, fog); ctx.lineWidth = Math.max(1,w2*0.03);
      ctx.save(); ctx.translate(px2,y2); ctx.rotate(side*0.12);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-boy); ctx.stroke();
      ctx.fillStyle = '#ffb02e';
      ctx.fillRect(-w2*0.28,-boy-w2*0.22,w2*0.56,w2*0.22);
      ctx.restore();
    }
  } else if(zon===3){
    if(idx%5===0){
      const side = idx%10===0?-1:1;
      const bx = x2+w2*side*1.6;
      ctx.fillStyle = ['#e63946','#ffb02e','#2ee6c8'][idx%3];
      ctx.beginPath(); ctx.moveTo(bx,y2-w2*1.3); ctx.lineTo(bx-w2*0.55,y2-w2*0.85); ctx.lineTo(bx+w2*0.55,y2-w2*0.85); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = renkKaris('#5b4a38', SKY, fog); ctx.lineWidth = Math.max(1,w2*0.03);
      ctx.beginPath(); ctx.moveTo(bx,y2-w2*0.85); ctx.lineTo(bx,y2); ctx.stroke();
    }
  }
}

function ustCiz(u, o, G){
  const s = u.s, w = s.w2, x = s.x2, y = s.y2, F = 1 - s.fog;
  if(u.tip==='tabela'){
    ctx.fillStyle = renkKaris('#2a3142', SKY, s.fog);
    ctx.fillRect(x - w*1.18, y - w*1.05, Math.max(2, w*0.07), w*1.05);
    ctx.fillRect(x + w*1.11, y - w*1.05, Math.max(2, w*0.07), w*1.05);
    ctx.fillStyle = renkKaris('#151922', SKY, s.fog);
    ctx.fillRect(x - w*1.2, y - w*1.05, w*2.4, w*0.3);
    if(w > 26){
      ctx.fillStyle = `rgba(46,230,200,${F.toFixed(2)})`;
      ctx.font = `800 ${Math.max(9, w*0.16)|0}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText((H.MESAFE - u.m) + ' m', x, y - w*0.83);
    }
  } else if(u.tip==='pilon'){
    ctx.fillStyle = renkKaris('#8c2430', SKY, s.fog);
    ctx.fillRect(x - w*1.55, y - w*2.7, w*0.3, w*2.7);
    ctx.fillRect(x + w*1.25, y - w*2.7, w*0.3, w*2.7);
    ctx.fillRect(x - w*1.55, y - w*2.1, w*3.1, w*0.28);
    ctx.fillStyle = renkKaris('#b23342', SKY, s.fog);
    ctx.fillRect(x - w*1.55, y - w*2.1, w*3.1, w*0.07);
    ctx.strokeStyle = `rgba(200,220,255,${(0.35*F).toFixed(2)})`;
    ctx.lineWidth = Math.max(1, w*0.03);
    ctx.beginPath();
    ctx.moveTo(x - w*1.4, y - w*2.7); ctx.quadraticCurveTo(x - w*1.3, y - w*0.6, x - w*1.14, y + w*2);
    ctx.moveTo(x + w*1.4, y - w*2.7); ctx.quadraticCurveTo(x + w*1.3, y - w*0.6, x + w*1.14, y + w*2);
    ctx.stroke();
    ctx.fillStyle = `rgba(255,90,90,${(0.4 + 0.5*Math.sin(o.sure*5)).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(x - w*1.4, y - w*2.7, Math.max(1.5, w*0.06), 0, T2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*1.4, y - w*2.7, Math.max(1.5, w*0.06), 0, T2); ctx.fill();
  } else if(u.tip==='bitis'){
    ctx.fillStyle = renkKaris('#2a3142', SKY, s.fog);
    ctx.fillRect(x - w*1.25, y - w*1.5, Math.max(2, w*0.1), w*1.5);
    ctx.fillRect(x + w*1.15, y - w*1.5, Math.max(2, w*0.1), w*1.5);
    ctx.fillStyle = renkKaris('#14161c', SKY, s.fog);
    ctx.fillRect(x - w*1.3, y - w*1.5, w*2.6, w*0.42);
    ctx.globalAlpha = F;
    for(let q=0;q<14;q++){
      ctx.fillStyle = q%2 ? '#ebebeb' : '#141414';
      ctx.fillRect(x - w*1.3 + w*2.6*q/14, y - w*1.12, w*2.6/14, w*0.06);
    }
    ctx.globalAlpha = 1;
    if(w > 20){
      ctx.fillStyle = `rgba(255,176,46,${F.toFixed(2)})`;
      ctx.font = `900 ${Math.max(10, w*0.24)|0}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText('BİTİŞ', x, y - w*1.2);
    }
  }
}

// ============ ARKADAN GÖRÜNÜMLÜ ARAÇ ============
const MODEL_GORUNUM = {
  // gen: genişlik çarpanı | trk: teker izi (dar/geniş duruş) | tire: lastik kalınlığı
  sahin:  { gen:0.86, kasa:'kutu',   spoyler:null,    trk:0.90, tire:0.105 },  // dar, yüksek, ince lastik
  dogan:  { gen:0.90, kasa:'sedan',  spoyler:null,    trk:0.93, tire:0.118 },
  tayfun: { gen:0.95, kasa:'hatch',  spoyler:'ruf',   trk:0.97, tire:0.140 },
  bogaz:  { gen:1.02, kasa:'kupe',   spoyler:null,   ledBar:true, trk:1.02, tire:0.158 },
  poyraz: { gen:1.06, kasa:'kupe',   spoyler:'kanat', serit:true, trk:1.06, tire:0.170 },
  efsane: { gen:1.16, kasa:'hiper',  spoyler:'kanat', ledBar:true, trk:1.12, tire:0.195 }, // çok geniş, kalın lastik
  generic:{ gen:0.88, kasa:'sedan',  spoyler:null,    trk:0.92, tire:0.115 }
};
function tekerCiz(ex, wheelW, wheelH, w, koyu2, oyuncu){
  const detay = wheelW > 8;
  // lastik gövdesi (dış koyu + iç lastik dokusu)
  ctx.fillStyle = '#08090c';
  ctx.beginPath(); ctx.roundRect(ex - wheelW/2, -wheelH, wheelW, wheelH, wheelW*0.30); ctx.fill();
  // lastik yan duvarı (hafif gri halka)
  ctx.strokeStyle = 'rgba(60,66,76,.6)'; ctx.lineWidth = Math.max(0.6, wheelW*0.09);
  ctx.beginPath(); ctx.roundRect(ex - wheelW*0.40, -wheelH + wheelW*0.10, wheelW*0.80, wheelH - wheelW*0.20, wheelW*0.22); ctx.stroke();
  // parlak üst highlight (lastik üstüne ışık)
  ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = Math.max(0.5, wheelW*0.05);
  ctx.beginPath(); ctx.arc(ex, -wheelH+wheelW*0.4, wheelW*0.34, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
  // jant tabağı
  const hubR = wheelW*0.34, hubY = -wheelH*0.46;
  const hg = ctx.createRadialGradient(ex - hubR*0.35, hubY - hubR*0.35, hubR*0.08, ex, hubY, hubR);
  hg.addColorStop(0, '#f4f7fb'); hg.addColorStop(0.35, '#c2ccd8'); hg.addColorStop(0.7, koyu2); hg.addColorStop(1, '#0e1116');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(ex, hubY, hubR, 0, T2); ctx.fill();
  ctx.strokeStyle = '#0009'; ctx.lineWidth = Math.max(0.5, hubR*0.10); ctx.stroke();
  if(detay){
    // 5 çift kollu spor jant
    ctx.strokeStyle = '#2c313b'; ctx.lineWidth = Math.max(0.7, hubR*0.17); ctx.lineCap='round';
    for(let k=0;k<5;k++){
      const a = k*T2/5 + 0.3;
      const a2 = a + 0.22;
      ctx.beginPath(); ctx.moveTo(ex+Math.cos(a)*hubR*0.2, hubY+Math.sin(a)*hubR*0.2); ctx.lineTo(ex + Math.cos(a)*hubR*0.88, hubY + Math.sin(a)*hubR*0.88); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+Math.cos(a2)*hubR*0.2, hubY+Math.sin(a2)*hubR*0.2); ctx.lineTo(ex + Math.cos(a2)*hubR*0.88, hubY + Math.sin(a2)*hubR*0.88); ctx.stroke();
    }
    // jant dış halka (parlak metalik)
    ctx.strokeStyle = 'rgba(230,238,248,.5)'; ctx.lineWidth = Math.max(0.6, hubR*0.10);
    ctx.beginPath(); ctx.arc(ex, hubY, hubR*0.82, 0, T2); ctx.stroke();
    // fren kaliperi (jant içinde renkli nokta)
    if(oyuncu){
      ctx.fillStyle = '#e0182e';
      ctx.beginPath(); ctx.arc(ex+hubR*0.4, hubY+hubR*0.3, hubR*0.2, 0, T2); ctx.fill();
    }
  }
  // göbek somunu
  ctx.fillStyle = '#1a1e26'; ctx.beginPath(); ctx.arc(ex, hubY, hubR*0.20, 0, T2); ctx.fill();
  ctx.fillStyle = '#3a4150'; ctx.beginPath(); ctx.arc(ex-hubR*0.05, hubY-hubR*0.05, hubR*0.10, 0, T2); ctx.fill();
}
function aracArka(cx, cyAlt, w, cfg){
  const m = MODEL_GORUNUM[cfg.model] || MODEL_GORUNUM.generic;
  const renk = cfg.renk;
  const koyu = ton(renk,-0.42), koyu2 = ton(renk,-0.62), koyu3 = ton(renk,-0.78);
  const acikTop = ton(renk,0.42), acik = ton(renk,0.22), parlak = ton(renk,0.62);
  const mod = cfg.mod || 0;
  const detay = w > 42;
  const inceDetay = w > 80;
  const hiper = m.kasa==='hiper';
  const kupe = m.kasa==='kupe' || hiper;
  const kutu = m.kasa==='kutu';
  const hatch = m.kasa==='hatch';
  // ---- KASA SİLUETİ: her tip belirgin şekilde farklı ----
  // kutu (Şahin): yüksek, dar, dik  | sedan (Doğan): orta
  // hatch (Tayfun): kısa, yuvarlak  | kupe (Boğaz/Poyraz): alçak, geniş
  // hiper (Efsane): çok alçak, çok geniş
  const K = hiper  ? {belt:0.205, kabin:0.135, kabinW:0.78, camEgim:0.30, tavan:0.86}
          : kupe   ? {belt:0.245, kabin:0.165, kabinW:0.70, camEgim:0.22, tavan:0.80}
          : hatch  ? {belt:0.290, kabin:0.215, kabinW:0.60, camEgim:0.10, tavan:0.66}
          : kutu   ? {belt:0.330, kabin:0.275, kabinW:0.58, camEgim:0.02, tavan:0.56}
          :          {belt:0.300, kabin:0.230, kabinW:0.59, camEgim:0.06, tavan:0.62}; // sedan
  const beltH = w*K.belt;
  const kabinH = w*K.kabin;
  const kabinW = w*K.kabinW;
  const trk = m.trk||0.94, tireW = w*(m.tire||0.12), tireH = w*0.175;
  const wx = w*0.5*trk;
  ctx.save(); ctx.translate(cx, cyAlt);

  // ---- ZEMİN GÖLGESİ (çok katmanlı, yumuşak) ----
  const shg = ctx.createRadialGradient(0, w*0.02, w*0.05, 0, w*0.02, w*0.62);
  shg.addColorStop(0,'rgba(0,0,0,.5)'); shg.addColorStop(0.7,'rgba(0,0,0,.28)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = shg;
  ctx.beginPath(); ctx.ellipse(0, w*0.03, w*0.62, w*0.10, 0, 0, T2); ctx.fill();

  // ---- YERE VURAN RENKLİ IŞIK YANSIMASI (stop lambası + zemin) ----
  if(detay){
    ctx.fillStyle = `rgba(${cfg.fren?255:200},30,50,${cfg.fren?0.16:0.08})`;
    ctx.beginPath(); ctx.ellipse(0, w*0.12, w*0.4, w*0.06, 0, 0, T2); ctx.fill();
  }

  // ---- LASTİKLER ----
  tekerCiz(-wx, tireW, tireH, w, koyu2, cfg.oyuncu);
  tekerCiz( wx, tireW, tireH, w, koyu2, cfg.oyuncu);

  // ---- GÖVDE ALT (difüzör/karaliçe gölgesi) ----
  ctx.fillStyle = koyu3;
  ctx.beginPath(); ctx.roundRect(-w*0.49, -beltH*0.34, w*0.98, beltH*0.34, w*0.02); ctx.fill();

  // ---- ANA GÖVDE: çok duraklı metalik gradyan ----
  const govdeGrad = ctx.createLinearGradient(-w*0.5, 0, w*0.5, 0);
  govdeGrad.addColorStop(0, koyu3);
  govdeGrad.addColorStop(0.10, koyu);
  govdeGrad.addColorStop(0.30, acik);
  govdeGrad.addColorStop(0.46, acikTop);
  govdeGrad.addColorStop(0.54, acikTop);
  govdeGrad.addColorStop(0.70, acik);
  govdeGrad.addColorStop(0.90, koyu);
  govdeGrad.addColorStop(1, koyu3);
  ctx.fillStyle = govdeGrad;
  ctx.beginPath();
  ctx.moveTo(-w*0.5, 0);
  ctx.lineTo(-w*0.5, -beltH*0.60);
  ctx.quadraticCurveTo(-w*0.5, -beltH, -w*0.43, -beltH);
  ctx.lineTo(w*0.43, -beltH);
  ctx.quadraticCurveTo(w*0.5, -beltH, w*0.5, -beltH*0.60);
  ctx.lineTo(w*0.5, 0);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.55)'; ctx.lineWidth = Math.max(1, w*0.014); ctx.stroke();

  // ---- GÖVDE ÜST YANSIMA BANDI (gökyüzü yansıması) ----
  const yansGrad = ctx.createLinearGradient(0, -beltH, 0, -beltH*0.45);
  yansGrad.addColorStop(0, 'rgba(255,255,255,.28)');
  yansGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = yansGrad;
  ctx.beginPath(); ctx.roundRect(-w*0.42, -beltH+w*0.01, w*0.84, beltH*0.4, w*0.02); ctx.fill();

  // ---- KAROSER KARAKTER ÇİZGİSİ (yatay bel hattı) ----
  if(detay){
    ctx.strokeStyle = 'rgba(0,0,0,.28)'; ctx.lineWidth = Math.max(0.8, w*0.008);
    ctx.beginPath(); ctx.moveTo(-w*0.48, -beltH*0.5); ctx.lineTo(w*0.48, -beltH*0.5); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.10)'; ctx.lineWidth = Math.max(0.6, w*0.005);
    ctx.beginPath(); ctx.moveTo(-w*0.48, -beltH*0.5-w*0.008); ctx.lineTo(w*0.48, -beltH*0.5-w*0.008); ctx.stroke();
  }

  // ---- ÇAMURLUK KAVİSLERİ (tekerlek üstü koyu kemer) ----
  ctx.fillStyle = 'rgba(0,0,0,.34)';
  for(const sgn of [-1,1]){
    ctx.beginPath();
    ctx.ellipse(sgn*wx, -w*0.005, tireW*0.66, w*0.06, 0, Math.PI, 0, false);
    ctx.fill();
  }

  // ---- KABİN / TAVAN ----
  const kabinGrad = ctx.createLinearGradient(-kabinW/2, 0, kabinW/2, 0);
  kabinGrad.addColorStop(0, koyu2);
  kabinGrad.addColorStop(0.5, acik);
  kabinGrad.addColorStop(1, koyu2);
  ctx.fillStyle = kabinGrad;
  ctx.beginPath();
  ctx.moveTo(-kabinW/2 - w*0.05, -beltH);
  ctx.lineTo(-kabinW/2 + w*0.03, -beltH - kabinH);
  ctx.quadraticCurveTo(0, -beltH - kabinH - w*0.025, kabinW/2 - w*0.03, -beltH - kabinH);
  ctx.lineTo(kabinW/2 + w*0.05, -beltH);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = Math.max(1, w*0.012); ctx.stroke();

  // C-direkleri (kabin kenar sütunları)
  ctx.fillStyle = koyu3;
  ctx.beginPath(); ctx.moveTo(-kabinW/2-w*0.05,-beltH); ctx.lineTo(-kabinW/2+w*0.03,-beltH-kabinH); ctx.lineTo(-kabinW/2+w*0.075,-beltH-kabinH); ctx.lineTo(-kabinW/2+w*0.01,-beltH); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(kabinW/2+w*0.05,-beltH); ctx.lineTo(kabinW/2-w*0.03,-beltH-kabinH); ctx.lineTo(kabinW/2-w*0.075,-beltH-kabinH); ctx.lineTo(kabinW/2-w*0.01,-beltH); ctx.closePath(); ctx.fill();

  // ---- ARKA CAM (gökyüzü yansımalı, defroster çizgili) ----
  const camGrad = ctx.createLinearGradient(0, -beltH-kabinH, 0, -beltH);
  camGrad.addColorStop(0, '#243851'); camGrad.addColorStop(0.5, '#0c141f'); camGrad.addColorStop(1, '#05090f');
  ctx.fillStyle = camGrad;
  ctx.beginPath();
  ctx.moveTo(-kabinW/2 + w*0.02, -beltH - w*0.012);
  ctx.lineTo(-kabinW/2 + w*0.075, -beltH - kabinH + w*0.022);
  ctx.lineTo(kabinW/2 - w*0.075, -beltH - kabinH + w*0.022);
  ctx.lineTo(kabinW/2 - w*0.02, -beltH - w*0.012);
  ctx.closePath(); ctx.fill();
  if(inceDetay){
    // defroster telleri
    ctx.strokeStyle = 'rgba(150,190,230,.14)'; ctx.lineWidth = 0.8;
    for(let q=1;q<5;q++){
      const yy = -beltH - w*0.012 - (kabinH - w*0.034)*q/5;
      ctx.beginPath(); ctx.moveTo(-kabinW/2 + w*0.06, yy); ctx.lineTo(kabinW/2 - w*0.06, yy); ctx.stroke();
    }
  }
  // cam üst parlaması (diagonal highlight)
  if(detay){
    const cg = ctx.createLinearGradient(-kabinW/2, -beltH-kabinH, kabinW/2, -beltH);
    cg.addColorStop(0,'rgba(255,255,255,.30)'); cg.addColorStop(0.3,'rgba(255,255,255,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(-kabinW/2 + w*0.04, -beltH - w*0.012);
    ctx.lineTo(-kabinW/2 + w*0.085, -beltH - kabinH + w*0.026);
    ctx.lineTo(-kabinW*0.05, -beltH - kabinH + w*0.026);
    ctx.lineTo(-kabinW*0.16, -beltH - w*0.012);
    ctx.closePath(); ctx.fill();
  }

  // ---- YARIŞ ŞERİTLERİ ----
  if(m.serit || mod>=6){
    ctx.fillStyle = 'rgba(245,248,252,.9)';
    ctx.fillRect(-w*0.085, -beltH - kabinH - w*0.015, w*0.055, beltH + kabinH + w*0.015);
    ctx.fillRect( w*0.03,  -beltH - kabinH - w*0.015, w*0.055, beltH + kabinH + w*0.015);
    // şerit kenar gölgesi
    ctx.fillStyle = 'rgba(0,0,0,.15)';
    ctx.fillRect(-w*0.088, -beltH - kabinH - w*0.015, w*0.006, beltH + kabinH + w*0.015);
    ctx.fillRect( w*0.082, -beltH - kabinH - w*0.015, w*0.006, beltH + kabinH + w*0.015);
  }

  // ---- TAMPON ----
  const tampGrad = ctx.createLinearGradient(-w*0.5, 0, w*0.5, 0);
  tampGrad.addColorStop(0, koyu3); tampGrad.addColorStop(0.5, koyu); tampGrad.addColorStop(1, koyu3);
  ctx.fillStyle = tampGrad;
  ctx.fillRect(-w*0.5, -beltH*0.30, w, beltH*0.30);
  // alt siyah plastik
  ctx.fillStyle = '#0b0d11';
  ctx.fillRect(-w*0.36, -beltH*0.14, w*0.72, beltH*0.14);
  if(detay){
    // ızgara/havalandırma dokusu
    ctx.fillStyle = '#181c24';
    for(let q=0;q<5;q++) ctx.fillRect(-w*0.32 + q*w*0.14, -beltH*0.125, w*0.09, beltH*0.02);
    // difüzör kanatları (spor modeller)
    if(kupe){
      ctx.fillStyle = '#080a0e';
      for(let q=0;q<6;q++) ctx.fillRect(-w*0.46 + q*w*0.155, -beltH*0.055, w*0.10, beltH*0.055);
    }
  }

  // ---- STOP LAMBALARI (çok katmanlı gerçekçi parlama) ----
  const frenParla = cfg.fren ? 1 : 0;
  ctx.save();
  ctx.shadowColor = '#ff1030';
  ctx.shadowBlur = w*(0.09 + 0.14*frenParla);
  const lampY = -beltH + w*0.04;
  if(m.ledBar){
    const lh = Math.max(1.8, w*0.04);
    const lg = ctx.createLinearGradient(0, lampY, 0, lampY+lh);
    lg.addColorStop(0, frenParla?'#ff9aa4':'#ff5866'); lg.addColorStop(1, frenParla?'#ff1c34':'#b00d1c');
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.roundRect(-w*0.42, lampY, w*0.84, lh, lh/2); ctx.fill();
    // iç parlak çekirdek
    ctx.shadowBlur = 0; ctx.fillStyle = frenParla?'rgba(255,220,225,.9)':'rgba(255,150,160,.5)';
    ctx.beginPath(); ctx.roundRect(-w*0.4, lampY+lh*0.28, w*0.8, lh*0.32, lh*0.16); ctx.fill();
  } else {
    for(const sgn of [-1,1]){
      const lx = sgn<0 ? -w*0.46 : w*0.29;
      const lw = w*0.17, lh = Math.max(1.8, w*0.06);
      const lg = ctx.createLinearGradient(0, lampY, 0, lampY+lh);
      lg.addColorStop(0, frenParla?'#ff9aa4':'#ff5866'); lg.addColorStop(1, frenParla?'#ff1c34':'#a80c1a');
      ctx.fillStyle = lg;
      ctx.beginPath(); ctx.roundRect(lx, lampY, lw, lh, lh*0.25); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = frenParla?'rgba(255,225,228,.85)':'rgba(255,140,150,.45)';
      ctx.beginPath(); ctx.roundRect(lx+lw*0.15, lampY+lh*0.25, lw*0.7, lh*0.3, lh*0.15); ctx.fill();
      ctx.shadowBlur = w*(0.09 + 0.14*frenParla);
    }
  }
  ctx.restore();
  // geri vites/sinyal beyaz noktaları
  if(inceDetay && !m.ledBar){
    ctx.fillStyle = 'rgba(255,240,210,.7)';
    ctx.fillRect(-w*0.30, lampY+w*0.01, w*0.05, w*0.02);
    ctx.fillRect( w*0.25, lampY+w*0.01, w*0.05, w*0.02);
  }

  // ---- PLAKA ----
  if(detay){
    ctx.fillStyle = '#e6ebf2';
    ctx.beginPath(); ctx.roundRect(-w*0.09, -beltH*0.64, w*0.18, w*0.058, w*0.006); ctx.fill();
    ctx.fillStyle = '#1d3f8f';
    ctx.fillRect(-w*0.09, -beltH*0.64, w*0.024, w*0.058);
    if(inceDetay){
      ctx.fillStyle = '#3a4152'; ctx.font = `700 ${Math.max(4,w*0.028)|0}px monospace`; ctx.textAlign='center';
      ctx.fillText('34 TR', w*0.008, -beltH*0.64+w*0.042);
    }
  }

  // ---- YAN AYNALAR ----
  ctx.fillStyle = koyu;
  ctx.beginPath(); ctx.roundRect(-w*0.565, -beltH - w*0.025, w*0.06, w*0.05, w*0.012); ctx.fill();
  ctx.beginPath(); ctx.roundRect( w*0.505, -beltH - w*0.025, w*0.06, w*0.05, w*0.012); ctx.fill();
  ctx.fillStyle = 'rgba(150,190,230,.4)';
  if(detay){
    ctx.fillRect(-w*0.558, -beltH-w*0.018, w*0.04, w*0.03);
    ctx.fillRect( w*0.518, -beltH-w*0.018, w*0.04, w*0.03);
  }

  // ---- SPOYLER / KANAT ----
  const kanat = m.spoyler==='kanat' || (mod>=12 && cfg.model!=='generic');
  if(kanat){
    // kanat ayakları
    ctx.fillStyle = '#0f1116';
    ctx.fillRect(-w*0.30, -beltH - w*0.11, w*0.05, w*0.11);
    ctx.fillRect( w*0.25, -beltH - w*0.11, w*0.05, w*0.11);
    // kanat kanadı (gradyanlı)
    const kg = ctx.createLinearGradient(-w*0.47,0,w*0.47,0);
    kg.addColorStop(0, koyu3); kg.addColorStop(0.5, koyu); kg.addColorStop(1, koyu3);
    ctx.fillStyle = kg;
    ctx.beginPath(); ctx.roundRect(-w*0.47, -beltH - w*0.15, w*0.94, w*0.055, w*0.02); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = 1; ctx.stroke();
    // kanat üst parlama
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.beginPath(); ctx.roundRect(-w*0.45, -beltH - w*0.148, w*0.9, w*0.014, w*0.006); ctx.fill();
    // uç plakalar
    ctx.fillStyle = koyu3;
    ctx.fillRect(-w*0.475, -beltH - w*0.175, w*0.035, w*0.08);
    ctx.fillRect( w*0.44, -beltH - w*0.175, w*0.035, w*0.08);
  } else if(m.spoyler==='ruf'){
    ctx.fillStyle = koyu3;
    ctx.beginPath(); ctx.roundRect(-kabinW*0.42, -beltH - kabinH - w*0.035, kabinW*0.84, w*0.03, w*0.01); ctx.fill();
  }

  // ---- EGZOZ + NİTRO ----
  const egzozlar = hiper ? [[-w*0.07, w*0.055]] : [[-w*0.37, w*0.04],[ w*0.33, w*0.04]];
  for(const [ex, er] of egzozlar){
    // krom egzoz halkası
    const eg = ctx.createRadialGradient(ex+er/2-er*0.3, -beltH*0.06-er*0.3, er*0.1, ex+er/2, -beltH*0.06, er);
    eg.addColorStop(0,'#8a929e'); eg.addColorStop(0.6,'#3a414c'); eg.addColorStop(1,'#0a0c10');
    ctx.fillStyle = eg;
    ctx.beginPath(); ctx.ellipse(ex + er/2, -beltH*0.06, er, er*0.72, 0, 0, T2); ctx.fill();
    ctx.fillStyle = '#050608';
    ctx.beginPath(); ctx.ellipse(ex + er/2, -beltH*0.06, er*0.55, er*0.42, 0, 0, T2); ctx.fill();
    if(cfg.nitro){
      ctx.save();
      ctx.shadowColor = '#2ee6c8'; ctx.shadowBlur = w*0.2;
      const boy = w*(0.16 + Math.random()*0.14);
      ctx.fillStyle = 'rgba(200,255,248,.95)';
      ctx.beginPath();
      ctx.moveTo(ex, -beltH*0.05); ctx.lineTo(ex + er, -beltH*0.05);
      ctx.lineTo(ex + er/2, -beltH*0.05 + boy); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(46,230,200,.55)';
      ctx.beginPath();
      ctx.moveTo(ex - er*0.5, -beltH*0.05); ctx.lineTo(ex + er*1.5, -beltH*0.05);
      ctx.lineTo(ex + er/2, -beltH*0.05 + boy*1.6); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // ---- HASAR GÖSTERGESİ (çizikler/is) ----
  if(cfg.hasar && cfg.hasar > 0.25){
    ctx.strokeStyle = `rgba(20,20,24,${Math.min(0.6,cfg.hasar).toFixed(2)})`;
    ctx.lineWidth = Math.max(0.8, w*0.01);
    for(let q=0;q<Math.floor(cfg.hasar*5);q++){
      const hx = (srand(q*13)-0.5)*w*0.7, hy = -beltH*(0.2+srand(q*7)*0.6);
      ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx+w*0.06, hy+w*0.03); ctx.stroke();
    }
    if(cfg.hasar > 0.6){
      ctx.fillStyle = 'rgba(30,30,34,.4)';
      ctx.beginPath(); ctx.ellipse(w*0.3, -beltH*0.5, w*0.1, w*0.14, 0, 0, T2); ctx.fill();
    }
  }

  // ---- ÜST KENAR IŞIK ÇİZGİSİ (tavan highlight) ----
  if(detay){
    ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = Math.max(0.8, w*0.01);
    ctx.beginPath(); ctx.moveTo(-kabinW*0.32, -beltH - kabinH + w*0.03); ctx.lineTo(kabinW*0.22, -beltH - kabinH + w*0.026); ctx.stroke();
  }
  ctx.restore();
}

// ============ GİRDİ ============
function tusBagla(el, alan){
  const bas = e=>{ e.preventDefault(); girdi[alan]=true; Ses.devam(); };
  const birak = e=>{ e.preventDefault(); girdi[alan]=false; };
  el.addEventListener('pointerdown', bas);
  el.addEventListener('pointerup', birak);
  el.addEventListener('pointerleave', birak);
  el.addEventListener('pointercancel', birak);
}
tusBagla($('btnSol'),'sol'); tusBagla($('btnSag'),'sag'); tusBagla($('btnNitro'),'nitro');
addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') girdi.sol=true;
  if(e.key==='ArrowRight'||e.key==='d') girdi.sag=true;
  if(e.key===' '||e.key==='Shift'){ girdi.nitro=true; e.preventDefault(); }
});
addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') girdi.sol=false;
  if(e.key==='ArrowRight'||e.key==='d') girdi.sag=false;
  if(e.key===' '||e.key==='Shift') girdi.nitro=false;
});
$('isimGiris').addEventListener('keydown', e=>{ if(e.key==='Enter') isimKaydet(); });

  await profilYukle();
  if(profil.isim){
    paraYaz(); sekmeAc('garaj'); ekranAc('garajEkrani');
  } else {
    ekranAc('isimEkrani');
  }
})();
