<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Turbo Yarış: Gece Ligi</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0d0f14; --panel:#161a22; --panel2:#1e2430; --line:#2a3142;
    --amber:#ffb02e; --amber-dark:#c77f00; --teal:#2ee6c8; --red:#ff4d5e;
    --text:#e8ecf4; --muted:#8b94a8;
  }
  html,body { height:100%; overflow:hidden; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    user-select:none; touch-action:manipulation;
  }
  .ekran { display:none; height:100vh; height:100dvh; flex-direction:column; overflow:hidden; }
  .ekran.aktif { display:flex; }
  h1,h2 { font-weight:800; letter-spacing:.5px; }
  .baslik-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:var(--panel); border-bottom:2px solid var(--line);
    flex-shrink:0;
  }
  .logo { font-size:20px; font-weight:900; font-style:italic; }
  .logo span { color:var(--amber); }
  .para-rozet {
    background:var(--panel2); border:1px solid var(--amber-dark);
    padding:6px 12px; border-radius:20px; font-weight:700; color:var(--amber); font-size:14px;
  }
  .icerik { flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch; }
  .btn {
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    padding:12px 18px; border-radius:10px; font-size:15px; font-weight:700;
    cursor:pointer; transition:transform .08s, background .15s; font-family:inherit;
  }
  .btn:active { transform:scale(.96); }
  .btn-ana { background:var(--amber); color:#1a1200; border-color:var(--amber); }
  .btn-teal { background:var(--teal); color:#00241d; border-color:var(--teal); }
  .btn-kucuk { padding:8px 12px; font-size:13px; }
  .btn:disabled { opacity:.35; cursor:default; }
  .sekmeler { display:flex; gap:8px; padding:10px 14px 0; flex-shrink:0; }
  .sekme {
    flex:1; text-align:center; padding:10px; border-radius:10px 10px 0 0;
    background:var(--panel); color:var(--muted); font-weight:700; font-size:14px; cursor:pointer;
    border:1px solid var(--line); border-bottom:none;
  }
  .sekme.aktif { background:var(--panel2); color:var(--amber); }

  .araba-kart {
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:12px;
  }
  .araba-kart.secili { border-color:var(--amber); box-shadow:0 0 0 1px var(--amber); }
  .araba-ust { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .araba-ad { font-size:17px; font-weight:800; }
  .araba-sinif { font-size:11px; color:var(--muted); letter-spacing:1px; }
  .araba-cizim { display:block; margin:6px auto; }
  .stat-satir { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:12px; }
  .stat-satir .ad { width:74px; color:var(--muted); }
  .stat-cubuk { flex:1; height:8px; background:var(--panel2); border-radius:4px; overflow:hidden; }
  .stat-dolu { height:100%; background:var(--teal); border-radius:4px; }
  .stat-dolu.mod { background:var(--amber); }
  .araba-alt { display:flex; gap:8px; margin-top:10px; }
  .araba-alt .btn { flex:1; }

  .mod-satir {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px;
  }
  .mod-bilgi { flex:1; }
  .mod-ad { font-weight:800; font-size:15px; }
  .mod-aciklama { font-size:12px; color:var(--muted); margin-top:2px; }
  .seviye-noktalar { display:flex; gap:4px; margin-top:6px; }
  .nokta { width:14px; height:6px; border-radius:3px; background:var(--panel2); }
  .nokta.dolu { background:var(--amber); }
  .renkler { display:flex; gap:10px; flex-wrap:wrap; padding:4px 0 12px; }
  .renk-top { width:36px; height:36px; border-radius:50%; border:3px solid transparent; cursor:pointer; }
  .renk-top.secili { border-color:#fff; }

  #yarisEkrani { background:#0a0c10; }
  #pist { display:block; width:100%; flex:1; touch-action:none; }
  .hud {
    position:absolute; top:0; left:0; right:0; display:flex;
    justify-content:space-between; padding:10px 14px; pointer-events:none;
    font-weight:800; font-size:14px; text-shadow:0 2px 4px #000;
  }
  #yarisSarici { position:relative; flex:1; display:flex; flex-direction:column; }
  .kontroller {
    display:flex; gap:10px; padding:12px; background:var(--panel);
    border-top:2px solid var(--line); flex-shrink:0;
  }
  .kbtn {
    flex:1; padding:20px 0; font-size:24px; border-radius:14px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-weight:900; cursor:pointer;
  }
  .kbtn:active { background:var(--line); }
  .kbtn.nitro { background:#1a2f2b; color:var(--teal); border-color:var(--teal); font-size:16px; }

  .kaplama {
    position:absolute; inset:0; background:rgba(10,12,16,.88); display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:10;
    text-align:center; padding:20px;
  }
  .kaplama.goster { display:flex; }
  .buyuk-yazi { font-size:44px; font-weight:900; font-style:italic; }

  .lider-satir {
    display:flex; align-items:center; gap:12px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px;
  }
  .lider-satir.ben { border-color:var(--teal); }
  .sira-no { font-size:18px; font-weight:900; width:34px; color:var(--muted); }
  .sira-no.p1 { color:var(--amber); } .sira-no.p2 { color:#cfd6e4; } .sira-no.p3 { color:#d98a4a; }
  .lider-bilgi { flex:1; }
  .lider-ad { font-weight:800; font-size:15px; }
  .lider-araba { font-size:12px; color:var(--muted); }
  .lider-sure { font-weight:900; color:var(--teal); font-size:16px; }
  input[type=text] {
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    padding:12px 14px; border-radius:10px; font-size:16px; width:100%; font-family:inherit;
  }
  .konfeti { position:absolute; top:-10px; width:8px; height:14px; opacity:.95; animation:dus linear forwards; }
  @keyframes dus { to { transform:translateY(120vh) rotate(600deg); opacity:.2; } }
  .bos-mesaj { text-align:center; color:var(--muted); padding:30px 10px; font-size:14px; }
  .bilgi-kutu {
    background:var(--panel); border:1px dashed var(--line); border-radius:12px;
    padding:12px; font-size:13px; color:var(--muted); margin-bottom:12px; line-height:1.5;
  }
  .harita-kart {
    background:var(--panel); border:2px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:14px; cursor:pointer; transition:transform .1s, border-color .15s;
    position:relative; overflow:hidden;
  }
  .harita-kart:active { transform:scale(.98); }
  .harita-kart.aktif { border-color:var(--amber); }
  .harita-onizleme {
    height:110px; border-radius:10px; margin-bottom:10px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-size:40px;
  }
  .harita-ust { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
  .harita-ad { font-size:18px; font-weight:900; letter-spacing:.5px; }
  .harita-alt { font-size:12px; color:var(--muted); margin-top:2px; }
  .zorluk-rozet { font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .harita-detay { display:flex; gap:14px; margin-top:10px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<!-- İSİM EKRANI -->
<div class="ekran aktif" id="isimEkrani">
  <div class="icerik" style="display:flex;flex-direction:column;justify-content:center;max-width:420px;margin:0 auto;width:100%;">
    <div class="logo" style="font-size:34px;text-align:center;margin-bottom:6px;">TURBO <span>YARIŞ</span></div>
    <div style="text-align:center;color:var(--muted);margin-bottom:26px;font-size:14px;">Gece Ligi · Online skor tablosu</div>
    <label style="font-size:13px;color:var(--muted);margin-bottom:6px;">Pilot adın (skor tablosunda herkese görünür)</label>
    <input type="text" id="isimGiris" maxlength="14" placeholder="Örn: KaraSimsek34">
    <button class="btn btn-ana" style="margin-top:14px;" onclick="isimKaydet()">Garaja gir</button>
  </div>
</div>

<!-- GARAJ EKRANI -->
<div class="ekran" id="garajEkrani">
  <div class="baslik-bar">
    <div class="logo">TURBO <span>YARIŞ</span></div>
    <div class="para-rozet" id="paraGosterge">₺ 0</div>
  </div>
  <div class="sekmeler">
    <div class="sekme aktif" id="skGaraj" onclick="sekmeAc('garaj')">Garaj</div>
    <div class="sekme" id="skModifiye" onclick="sekmeAc('modifiye')">Modifiye</div>
    <div class="sekme" id="skLider" onclick="sekmeAc('lider')">Online sıralama</div>
  </div>
  <div class="icerik" id="garajIcerik"></div>
  <div style="padding:12px 14px;background:var(--panel);border-top:2px solid var(--line);flex-shrink:0;">
    <button class="btn btn-ana" style="width:100%;font-size:18px;padding:15px;" onclick="haritaEkraniAc()">YARIŞA BAŞLA 🏁</button>
  </div>
</div>

<!-- HARİTA SEÇİM EKRANI -->
<div class="ekran" id="haritaEkrani">
  <div class="baslik-bar">
    <button class="btn btn-kucuk" onclick="ekranAc('garajEkrani')">← Garaj</button>
    <div class="logo" style="font-size:16px;">PİST SEÇ</div>
    <div style="width:52px;"></div>
  </div>
  <div class="icerik" id="haritaIcerik"></div>
</div>

<!-- YARIŞ EKRANI -->
<div class="ekran" id="yarisEkrani">
  <div id="yarisSarici">
    <canvas id="pist"></canvas>
    <div class="hud">
      <div id="hudSol"></div>
      <div id="hudSag" style="text-align:right;"></div>
    </div>
    <div class="kaplama" id="geriSayim"><div class="buyuk-yazi" id="geriSayimYazi">3</div></div>
    <div class="kaplama" id="bitisKaplama">
      <div class="buyuk-yazi" id="bitisBaslik">BİTTİ!</div>
      <div id="bitisDetay" style="font-size:16px;line-height:1.8;"></div>
      <div style="display:flex;gap:10px;" id="bitisButonlar">
        <button class="btn" onclick="garajaDon()">Garaj</button>
        <button class="btn btn-ana" onclick="yarisBaslat()">Tekrar yarış</button>
      </div>
    </div>
  </div>
  <div class="kontroller">
    <button class="kbtn" id="btnSol">◀</button>
    <button class="kbtn nitro" id="btnNitro">NİTRO 🔥</button>
    <button class="kbtn" id="btnSag">▶</button>
  </div>
</div>

<script>
// ============ VERİLER ============
const ARABALAR = [
  { id:'sahin',  ad:'Şahin S',     sinif:'BAŞLANGIÇ', fiyat:0,     hiz:150, ivme:38, tutus:40, nitro:30 },
  { id:'dogan',  ad:'Doğan SLX',   sinif:'SOKAK',     fiyat:3500,  hiz:170, ivme:46, tutus:48, nitro:38 },
  { id:'tayfun', ad:'Tayfun R',    sinif:'SPOR',      fiyat:9000,  hiz:195, ivme:56, tutus:60, nitro:48 },
  { id:'bogaz',  ad:'Boğaz GT',    sinif:'SÜPER',     fiyat:18000, hiz:220, ivme:66, tutus:68, nitro:58 },
  { id:'poyraz', ad:'Poyraz RS',   sinif:'YARIŞ',     fiyat:32000, hiz:245, ivme:76, tutus:78, nitro:70 },
  { id:'efsane', ad:'Efsane X',    sinif:'HİPER',     fiyat:60000, hiz:280, ivme:90, tutus:88, nitro:85 },
];
const MODLAR = [
  { id:'motor',   ad:'Motor',            etki:'hiz',   aciklama:'Azami hız +8 km/s / seviye',  maliyet:800 },
  { id:'turbo',   ad:'Turbo',            etki:'ivme',  aciklama:'Hızlanma +6 / seviye',        maliyet:700 },
  { id:'lastik',  ad:'Yarış lastikleri', etki:'tutus', aciklama:'Yol tutuş +6 / seviye',        maliyet:600 },
  { id:'nitro',   ad:'Nitro tüpü',       etki:'nitro', aciklama:'Nitro gücü +7 / seviye',       maliyet:750 },
  { id:'agirlik', ad:'Ağırlık azaltma',  etki:'ivme2', aciklama:'Hızlanma +3 ve tutuş +3',      maliyet:900 },
];
const RENKLER = ['#e63946','#ffb02e','#2ee6c8','#4d7cff','#c084fc','#f4f4f4','#242424','#7bd94a'];
const MAKS_SEVIYE = 5;

// ============ HARİTALAR ============
const HARITALAR = [
  {
    id:'sehir', ad:'GECE YARIŞI', alt:'Şehir Merkezi & Boğaz', zorluk:'ORTA', zorlukRenk:'#ffb02e',
    ikon:'🌃', mesafe:5000, hava:'acik', tema:'sehir',
    bolgeler:[{ad:'ŞEHİR MERKEZİ'},{ad:'BOĞAZ KÖPRÜSÜ'},{ad:'TÜNEL'},{ad:'SON DÜZLÜK'}],
    sinirlar:[1600,3200,4200],
    virajlar:[[250,700,0.0046],[850,1250,-0.0056],[1320,1600,0.0028],[1900,2500,0.0036],[2650,3120,-0.0032],[3350,3720,0.003],[3820,4160,-0.0036]],
    trafikYogunluk:1.0, aiCarpan:1.0, pxSinir:1.0, gorusCarpan:1.0
  },
  {
    id:'dag', ad:'DAĞ GEÇİDİ', alt:'Sisli Virajlar', zorluk:'ZOR', zorlukRenk:'#ff8a3a',
    ikon:'🌲', mesafe:4600, hava:'sis', tema:'dag',
    bolgeler:[{ad:'ÇAM ORMANI'},{ad:'UÇURUM KENARI'},{ad:'SİSLİ GEÇİT'},{ad:'ZİRVE DÜZLÜĞÜ'}],
    sinirlar:[1400,2800,3800],
    virajlar:[[200,520,0.0068],[600,900,-0.0072],[980,1240,0.006],[1400,1650,-0.0064],[1750,2050,0.0058],[2150,2430,-0.0066],[2550,2850,0.0052],[2980,3300,-0.0058],[3450,3760,0.0044]],
    trafikYogunluk:1.25, aiCarpan:0.90, pxSinir:0.86, gorusCarpan:0.82
  },
  {
    id:'sahil', ad:'SAHİL FIRTINASI', alt:'Yağmurlu Otoyol', zorluk:'ÇOK ZOR', zorlukRenk:'#ff4d5e',
    ikon:'🌧️', mesafe:5400, hava:'yagmur', tema:'sahil',
    bolgeler:[{ad:'PALMİYELİ BULVAR'},{ad:'MARİNA'},{ad:'FIRTINA ŞERİDİ'},{ad:'FİNİŞ KUMSALI'}],
    sinirlar:[1700,3400,4500],
    virajlar:[[220,560,0.0052],[640,1000,-0.006],[1080,1380,0.0048],[1720,2100,-0.0068],[2200,2560,0.0058],[2680,3020,-0.0054],[3460,3820,0.006],[3920,4260,-0.0052]],
    trafikYogunluk:1.45, aiCarpan:0.84, pxSinir:0.82, gorusCarpan:0.78
  }
];
let secilenHarita = 'sehir';
let secilenZorluk = 'orta';

// ====== TURNUVA MODU ======
// 3 pist arka arkaya, F1 usulü puan, en çok puan şampiyon
const TURNUVA_PUAN = [10, 6, 4, 2, 1];   // 1., 2., 3., 4., 5.+
const TURNUVA_PISTLER = ['sehir','dag','sahil'];
let turnuva = null;   // {aktif, etap, puanlar:{isim:puan}, sureler:[], zorluk}

function turnuvaBaslat(zorluk){
  turnuva = {
    aktif: true,
    etap: 0,                       // 0,1,2
    puanlar: {},                   // isim -> toplam puan
    gecmis: [],                    // her etabın sonucu
    zorluk: zorluk || secilenZorluk
  };
  secilenZorluk = turnuva.zorluk;
  yarisBaslat(TURNUVA_PISTLER[0]);
}
function turnuvaIptal(){
  turnuva = null;
  garajaDon();
}
const ZORLUKLAR = {
  kolay: { ad:'KOLAY', renk:'#7bd94a', botHiz:1.15, trafik:0.7,  hasarCarp:0.5, odulCarp:0.7,  pxGevsek:0.16 },
  orta:  { ad:'ORTA',  renk:'#ffb02e', botHiz:0.98, trafik:1.0,  hasarCarp:1.0, odulCarp:1.0,  pxGevsek:0.0  },
  zor:   { ad:'ZOR',   renk:'#ff4d5e', botHiz:0.86, trafik:1.4,  hasarCarp:1.7, odulCarp:1.8,  pxGevsek:-0.08 }
};
let H = null; // aktif harita çözümlenmiş hali (yarisBaslat içinde kurulur)

// ============ PROFİL / DEPOLAMA ============
let profil = null;
let hafizaModu = false;
const varsayilanProfil = () => ({
  isim:'', para:2000,
  arabalar:{ sahin:{ mod:{motor:0,turbo:0,lastik:0,nitro:0,agirlik:0}, renk:'#e63946' } },
  secili:'sahin', enIyi:null
});

async function profilYukle(){
  try{
    const s = await window.storage.get('profil');
    profil = JSON.parse(s.value);
  }catch(e){ profil = varsayilanProfil(); }
  if(!profil || !profil.arabalar) profil = varsayilanProfil();
}
async function profilKaydet(){
  try{ await window.storage.set('profil', JSON.stringify(profil)); }
  catch(e){ hafizaModu = true; }
}
function temizAnahtar(ad){ return ad.replace(/[\s\/\\'"]/g,'_'); }
async function skorGonder(sure){
  if(profil.enIyi===null || sure < profil.enIyi){
    profil.enIyi = sure;
    await profilKaydet();
    try{
      await window.storage.set('lig:'+temizAnahtar(profil.isim),
        JSON.stringify({ isim:profil.isim, sure:sure, araba:ARABALAR.find(a=>a.id===profil.secili).ad, tarih:Date.now() }),
        true);
    }catch(e){}
    return true;
  }
  return false;
}
async function ligYukle(){
  const liste = [];
  try{
    const r = await window.storage.list('lig:', true);
    for(const k of (r.keys||[]).slice(0,60)){
      try{
        const kayit = await window.storage.get(k, true);
        liste.push(JSON.parse(kayit.value));
      }catch(e){}
    }
  }catch(e){}
  liste.sort((a,b)=>a.sure-b.sure);
  return liste;
}

// ============ YARDIMCILAR ============
const $ = id => document.getElementById(id);
function ekranAc(id){
  document.querySelectorAll('.ekran').forEach(e=>e.classList.remove('aktif'));
  $(id).classList.add('aktif');
}
function paraYaz(){ $('paraGosterge').textContent = '₺ ' + profil.para.toLocaleString('tr-TR'); }
function sureYaz(sn){
  const d = Math.floor(sn/60), s = Math.floor(sn%60), ms = Math.floor((sn%1)*100);
  return (d>0? d+':' : '') + String(s).padStart(2,'0') + '.' + String(ms).padStart(2,'0');
}
function modToplam(arabaId){
  const m = profil.arabalar[arabaId] ? profil.arabalar[arabaId].mod : null;
  return m ? Object.values(m).reduce((a,b)=>a+b,0) : 0;
}
function toplamStat(arabaId){
  const a = ARABALAR.find(x=>x.id===arabaId);
  const m = profil.arabalar[arabaId].mod;
  return {
    hiz:   a.hiz   + m.motor*8,
    ivme:  a.ivme  + m.turbo*6 + m.agirlik*3,
    tutus: a.tutus + m.lastik*6 + m.agirlik*3,
    nitro: a.nitro + m.nitro*7
  };
}
function ton(hex, f){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  if(f<0){ r*=(1+f); g*=(1+f); b*=(1+f); }
  else { r+=(255-r)*f; g+=(255-g)*f; b+=(255-b)*f; }
  return '#'+[r,g,b].map(v=>Math.round(Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}
function tekerSVG(cx, cy, r, jant, kaliper, klasik){
  const gid = `wg${Math.round(cx)}${Math.round(cy)}`;
  let s = `<defs>
    <radialGradient id="${gid}" cx="0.38" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#f4f7fb"/><stop offset="0.4" stop-color="#c2ccd8"/>
      <stop offset="0.75" stop-color="${jant}"/><stop offset="1" stop-color="#0e1116"/>
    </radialGradient>
  </defs>`;
  // lastik dış (kalın siyah)
  s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#0a0b0e"/>`;
  s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1c1f26" stroke-width="1.5"/>`;
  s += `<circle cx="${cx}" cy="${cy}" r="${(r*0.86).toFixed(1)}" fill="none" stroke="#2a2e37" stroke-width="${(r*0.13).toFixed(1)}"/>`;
  s += `<path d="M ${(cx-r*0.55).toFixed(1)} ${(cy-r*0.5).toFixed(1)} A ${r} ${r} 0 0 1 ${(cx+r*0.5).toFixed(1)} ${(cy-r*0.55).toFixed(1)}" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="${(r*0.1).toFixed(1)}"/>`;
  if(kaliper) s += `<circle cx="${(cx+r*0.36).toFixed(1)}" cy="${(cy-r*0.28).toFixed(1)}" r="${(r*0.2).toFixed(1)}" fill="${kaliper}"/>`;
  // jant tabağı (metalik gradyan)
  s += `<circle cx="${cx}" cy="${cy}" r="${(r*0.64).toFixed(1)}" fill="url(#${gid})" stroke="#0009" stroke-width="1"/>`;
  if(klasik){
    // klasik çelik jant: çok delikli (Şahin/Doğan tarzı)
    for(let i=0;i<8;i++){
      const a = i*Math.PI/4;
      const hx = cx+Math.cos(a)*r*0.42, hy = cy+Math.sin(a)*r*0.42;
      s += `<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="${(r*0.10).toFixed(1)}" fill="#15181e"/>`;
    }
    s += `<circle cx="${cx}" cy="${cy}" r="${(r*0.60).toFixed(1)}" fill="none" stroke="#d4dae4" stroke-opacity=".4" stroke-width="1"/>`;
    // krom göbek kapağı
    s += `<circle cx="${cx}" cy="${cy}" r="${(r*0.22).toFixed(1)}" fill="url(#${gid})" stroke="#0007" stroke-width=".8"/>`;
    s += `<circle cx="${(cx-r*0.06).toFixed(1)}" cy="${(cy-r*0.06).toFixed(1)}" r="${(r*0.08).toFixed(1)}" fill="#eef2f8" opacity=".7"/>`;
  } else {
    // modern spor jant: 5 çift kol
    for(let i=0;i<5;i++){
      const a = i*Math.PI*2/5 - Math.PI/2;
      const a2 = a + 0.28;
      s += `<line x1="${(cx+Math.cos(a)*r*0.15).toFixed(1)}" y1="${(cy+Math.sin(a)*r*0.15).toFixed(1)}" x2="${(cx+Math.cos(a)*r*0.58).toFixed(1)}" y2="${(cy+Math.sin(a)*r*0.58).toFixed(1)}" stroke="#2c313b" stroke-width="${(r*0.13).toFixed(1)}" stroke-linecap="round"/>`;
      s += `<line x1="${(cx+Math.cos(a2)*r*0.15).toFixed(1)}" y1="${(cy+Math.sin(a2)*r*0.15).toFixed(1)}" x2="${(cx+Math.cos(a2)*r*0.58).toFixed(1)}" y2="${(cy+Math.sin(a2)*r*0.58).toFixed(1)}" stroke="#2c313b" stroke-width="${(r*0.13).toFixed(1)}" stroke-linecap="round"/>`;
    }
    s += `<circle cx="${cx}" cy="${cy}" r="${(r*0.54).toFixed(1)}" fill="none" stroke="#e6eef8" stroke-opacity=".5" stroke-width="${(r*0.07).toFixed(1)}"/>`;
    s += `<circle cx="${cx}" cy="${cy}" r="${(r*0.15).toFixed(1)}" fill="#1a1e26"/>`;
    s += `<circle cx="${(cx-r*0.04).toFixed(1)}" cy="${(cy-r*0.04).toFixed(1)}" r="${(r*0.07).toFixed(1)}" fill="#3a4150"/>`;
  }
  return s;
}

// ============ GARAJ ARAYÜZÜ ============
let aktifSekme = 'garaj';
function sekmeAc(s){
  aktifSekme = s;
  ['garaj','modifiye','lider'].forEach(x=>{
    $('sk'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('aktif', x===s);
  });
  if(s==='garaj') garajCiz();
  if(s==='modifiye') modifiyeCiz();
  if(s==='lider') liderCiz();
}
function statCubuk(ad, deger, temel, maks=300){
  const modlu = deger > temel;
  return `<div class="stat-satir"><div class="ad">${ad}</div>
    <div class="stat-cubuk"><div class="stat-dolu ${modlu?'mod':''}" style="width:${Math.min(100,deger/maks*100)}%"></div></div>
    <div style="width:34px;text-align:right;font-weight:700;">${deger}</div></div>`;
}
function garajCiz(){
  let h = '';
  for(const a of ARABALAR){
    const sahip = !!profil.arabalar[a.id];
    const secili = profil.secili === a.id;
    const st = sahip ? toplamStat(a.id) : a;
    const renk = sahip ? profil.arabalar[a.id].renk : '#555';
    h += `<div class="araba-kart ${secili?'secili':''}">
      <div class="araba-ust">
        <div><div class="araba-ad">${a.ad}</div><div class="araba-sinif">${a.sinif}</div></div>
        ${secili?'<div style="color:var(--amber);font-weight:800;font-size:12px;">SEÇİLİ ✓</div>':''}
      </div>
      ${arabaSVG(a.id, renk, 200, sahip ? modToplam(a.id) : 0)}
      ${statCubuk('Azami hız', st.hiz, a.hiz)}
      ${statCubuk('Hızlanma', st.ivme, a.ivme, 120)}
      ${statCubuk('Yol tutuş', st.tutus, a.tutus, 120)}
      ${statCubuk('Nitro', st.nitro, a.nitro, 120)}
      <div class="araba-alt">
        ${sahip
          ? (secili ? '' : `<button class="btn btn-kucuk" onclick="arabaSec('${a.id}')">Bunu kullan</button>`)
          : `<button class="btn btn-kucuk ${profil.para>=a.fiyat?'btn-ana':''}" ${profil.para<a.fiyat?'disabled':''} onclick="arabaAl('${a.id}')">Satın al · ₺${a.fiyat.toLocaleString('tr-TR')}</button>`}
      </div>
    </div>`;
  }
  $('garajIcerik').innerHTML = h;
}
async function arabaAl(id){
  const a = ARABALAR.find(x=>x.id===id);
  if(profil.para < a.fiyat) return;
  profil.para -= a.fiyat;
  profil.arabalar[id] = { mod:{motor:0,turbo:0,lastik:0,nitro:0,agirlik:0}, renk:RENKLER[0] };
  profil.secili = id;
  await profilKaydet(); paraYaz(); garajCiz();
}
async function arabaSec(id){
  profil.secili = id; await profilKaydet(); garajCiz();
}
function modifiyeCiz(){
  const id = profil.secili;
  const a = ARABALAR.find(x=>x.id===id);
  const veri = profil.arabalar[id];
  const st = toplamStat(id);
  let h = `<div style="text-align:center;margin-bottom:4px;">
      <div class="araba-ad" style="font-size:20px;">${a.ad}</div>
      ${arabaSVG(id, veri.renk, 240, modToplam(id))}
    </div>
    <div class="bilgi-kutu" style="margin-bottom:10px;">🔧 Görsel yükseltmeler: toplam <b>6+ seviye</b> yarış şeritleri, <b>12+ seviye</b> altın spor jantlar ve arka kanat ekler.</div>

const SEG = 5, GORUS = 95;
let oyun = null, sonZaman = 0, animId = 0;
let girdi = { sol:false, sag:false, nitro:false };

// ============ SES (Web Audio, dosyasız — yumuşatılmış) ============
const Ses = {
  ac:null, master:null, acik:false,
  // motor katmanları
  mOsc:[], mGain:[], mFilt:null, motorGain:null, mLFO:null, mLFOGain:null,
  // nitro
  nitroSrc:null, nitroGain:null, nitroFilt:null,
  // rüzgâr (hız hissi)
  ruzgarSrc:null, ruzgarGain:null, ruzgarFilt:null,
  // lastik
  lastikSrc:null, lastikGain:null, lastikFilt:null,
  gurultuBuf:null,

  _gurultu(sn){
    const buf = this.ac.createBuffer(1, this.ac.sampleRate*sn, this.ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    return buf;
  },
  baslat(){
    if(this.ac) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ac = new AC();
      this.master = this.ac.createGain(); this.master.gain.value = 0.5;
      // hafif kompresör: sesler birbirini ezmesin, dolgun dursun
      const comp = this.ac.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 22; comp.ratio.value = 4;
      comp.attack.value = 0.004; comp.release.value = 0.18;
      this.master.connect(comp); comp.connect(this.ac.destination);
      this.gurultuBuf = this._gurultu(2);

      // ================= MOTOR (katmanlı) =================
      // Gerçek motor: temel ateşleme frekansı + harmonikler + hafif düzensizlik
      this.motorGain = this.ac.createGain(); this.motorGain.gain.value = 0;
      this.mFilt = this.ac.createBiquadFilter();
      this.mFilt.type='lowpass'; this.mFilt.frequency.value=420; this.mFilt.Q.value=1.1;
      // hafif distortion: motora "kaba"lık verir
      const shaper = this.ac.createWaveShaper();
      const kurv = new Float32Array(1024);
      for(let i=0;i<1024;i++){ const x=(i/512)-1; kurv[i]=Math.tanh(x*2.2); }
      shaper.curve = kurv; shaper.oversample='2x';
      // 4 harmonik katman: 1x(sawtooth ana), 0.5x(alt oktav güç), 2x, 3x
      const kat = [
        {carp:1.0,  tip:'sawtooth', kaz:0.42},
        {carp:0.5,  tip:'triangle', kaz:0.50},   // alt oktav = derinlik
        {carp:2.0,  tip:'sawtooth', kaz:0.18},
        {carp:3.01, tip:'triangle', kaz:0.10}    // 3.01: hafif detune → canlılık
      ];
      this.mOsc=[]; this.mGain=[]; this.mCarp=[];
      for(const k of kat){
        const o = this.ac.createOscillator(); o.type=k.tip;
        const g = this.ac.createGain(); g.gain.value=k.kaz;
        o.connect(g); g.connect(shaper);
        o.start();
        this.mOsc.push(o); this.mGain.push(g); this.mCarp.push(k.carp);
      }
      shaper.connect(this.mFilt);
      this.mFilt.connect(this.motorGain); this.motorGain.connect(this.master);
      // LFO: ateşleme titreşimi (motor "atıyor" hissi)
      this.mLFO = this.ac.createOscillator(); this.mLFO.type='sawtooth'; this.mLFO.frequency.value=26;
      this.mLFOGain = this.ac.createGain(); this.mLFOGain.gain.value=90;
      this.mLFO.connect(this.mLFOGain); this.mLFOGain.connect(this.mFilt.frequency);
      this.mLFO.start();

      // ================= NİTRO (jet) =================
      this.nitroSrc = this.ac.createBufferSource();
      this.nitroSrc.buffer = this.gurultuBuf; this.nitroSrc.loop = true;
      this.nitroFilt = this.ac.createBiquadFilter();
      this.nitroFilt.type='bandpass'; this.nitroFilt.frequency.value=1400; this.nitroFilt.Q.value=1.4;
      const nHi = this.ac.createBiquadFilter(); nHi.type='highpass'; nHi.frequency.value=600;
      this.nitroGain = this.ac.createGain(); this.nitroGain.gain.value=0;
      this.nitroSrc.connect(this.nitroFilt); this.nitroFilt.connect(nHi);
      nHi.connect(this.nitroGain); this.nitroGain.connect(this.master);
      this.nitroSrc.start();

      // ================= RÜZGÂR (hız hissi) =================
      this.ruzgarSrc = this.ac.createBufferSource();
      this.ruzgarSrc.buffer = this.gurultuBuf; this.ruzgarSrc.loop = true;
      this.ruzgarFilt = this.ac.createBiquadFilter();
      this.ruzgarFilt.type='bandpass'; this.ruzgarFilt.frequency.value=520; this.ruzgarFilt.Q.value=0.7;
      this.ruzgarGain = this.ac.createGain(); this.ruzgarGain.gain.value=0;
      this.ruzgarSrc.connect(this.ruzgarFilt); this.ruzgarFilt.connect(this.ruzgarGain);
      this.ruzgarGain.connect(this.master);
      this.ruzgarSrc.start();

      // ================= LASTİK (viraj cıyaklaması) =================
      this.lastikSrc = this.ac.createBufferSource();
      this.lastikSrc.buffer = this.gurultuBuf; this.lastikSrc.loop = true;
      this.lastikFilt = this.ac.createBiquadFilter();
      this.lastikFilt.type='bandpass'; this.lastikFilt.frequency.value=2600; this.lastikFilt.Q.value=7;
      this.lastikGain = this.ac.createGain(); this.lastikGain.gain.value=0;
      this.lastikSrc.connect(this.lastikFilt); this.lastikFilt.connect(this.lastikGain);
      this.lastikGain.connect(this.master);
      this.lastikSrc.start();

      this.acik = true;
    }catch(e){ this.acik = false; }
  },
  devam(){ if(this.ac && this.ac.state==='suspended') this.ac.resume(); },

  // oran: 0..1 hız | nitro: bool | lean: -1..1 direksiyon | kayma: 0..1 sürüklenme
  motor(oran, nitro, lean, kayma){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    // temel devir: gerçek motor gibi hızla yükselir
    const dev = 46 + oran*135 + (nitro?22:0);
    for(let i=0;i<this.mOsc.length;i++){
      this.mOsc[i].frequency.setTargetAtTime(dev*this.mCarp[i], t, 0.06);
    }
    // filtre açılır: hızlandıkça parlaklaşır
    this.mFilt.frequency.setTargetAtTime(300 + oran*1500 + (nitro?400:0), t, 0.09);
    this.mFilt.Q.setTargetAtTime(1.1 + oran*1.6, t, 0.1);
    // ateşleme titreşimi devirle artar
    this.mLFO.frequency.setTargetAtTime(20 + oran*46, t, 0.1);
    this.mLFOGain.gain.setTargetAtTime(60 + oran*130, t, 0.1);
    this.motorGain.gain.setTargetAtTime(0.026 + oran*0.036, t, 0.12);
    // nitro jet
    this.nitroGain.gain.setTargetAtTime(nitro?0.055:0, t, 0.1);
    if(nitro) this.nitroFilt.frequency.setTargetAtTime(1200 + Math.random()*700, t, 0.05);
    // rüzgâr: hızla yükselir
    this.ruzgarGain.gain.setTargetAtTime(oran*oran*0.05, t, 0.2);
    this.ruzgarFilt.frequency.setTargetAtTime(380 + oran*900, t, 0.2);
    // lastik cıyaklaması: sert direksiyon + hız
    const cy = Math.max(0, (Math.abs(lean||0) - 0.42)) * oran * (1 + (kayma||0));
    this.lastikGain.gain.setTargetAtTime(Math.min(0.06, cy*0.13), t, 0.07);
    this.lastikFilt.frequency.setTargetAtTime(2200 + Math.abs(lean||0)*1600, t, 0.09);
  },
  sustur(){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    this.motorGain.gain.setTargetAtTime(0, t, 0.22);
    this.nitroGain.gain.setTargetAtTime(0, t, 0.12);
    this.ruzgarGain.gain.setTargetAtTime(0, t, 0.2);
    this.lastikGain.gain.setTargetAtTime(0, t, 0.1);
  },

  // ==== ÇARPMA: metal darbe + cam + gövde rezonansı ====
  carp(siddet){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    const s = Math.max(0.4, Math.min(1.4, siddet||1));
    // 1) alçak "güm" (gövde)
    const gum = this.ac.createOscillator(); gum.type='sine';
    gum.frequency.setValueAtTime(150*s, t);
    gum.frequency.exponentialRampToValueAtTime(38, t+0.22);
    const gg = this.ac.createGain(); gg.gain.setValueAtTime(0.32*s, t);
    gg.gain.exponentialRampToValueAtTime(0.0001, t+0.3);
    gum.connect(gg); gg.connect(this.master); gum.start(t); gum.stop(t+0.32);
    // 2) metal çarpma (gürültü + bandpass)
    const n = this.ac.createBufferSource(); n.buffer = this.gurultuBuf;
    const nf = this.ac.createBiquadFilter(); nf.type='bandpass';
    nf.frequency.setValueAtTime(2400, t);
    nf.frequency.exponentialRampToValueAtTime(700, t+0.18);
    nf.Q.value = 1.6;
    const ng = this.ac.createGain(); ng.gain.setValueAtTime(0.26*s, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t+0.25);
    n.connect(nf); nf.connect(ng); ng.connect(this.master);
    n.start(t); n.stop(t+0.28);
    // 3) metalik çınlama (2 detune nota)
    [520, 780].forEach((fr,i)=>{
      const o = this.ac.createOscillator(); o.type='triangle';
      o.frequency.value = fr*(0.98+Math.random()*0.04);
      const g = this.ac.createGain(); g.gain.setValueAtTime(0.06*s, t+i*0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.4+i*0.1);
      o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.5);
    });
  },

  // ==== BİP (geri sayım) ====
  bip(yuksek){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    const o = this.ac.createOscillator(); o.type='square';
    o.frequency.value = yuksek?880:440;
    const f = this.ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2200;
    const g = this.ac.createGain(); g.gain.value=0.0001;
    g.gain.exponentialRampToValueAtTime(yuksek?0.11:0.075, t+0.015);
    g.gain.setValueAtTime(yuksek?0.11:0.075, t+(yuksek?0.30:0.09));
    g.gain.exponentialRampToValueAtTime(0.0001, t+(yuksek?0.45:0.18));
    o.connect(f); f.connect(g); g.connect(this.master);
    o.start(t); o.stop(t+(yuksek?0.48:0.2));
  },

  // ==== KIL PAYI: doppler "vınn" ====
  yakin(){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    const n = this.ac.createBufferSource(); n.buffer = this.gurultuBuf;
    const f = this.ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=3.2;
    f.frequency.setValueAtTime(1800, t);
    f.frequency.exponentialRampToValueAtTime(380, t+0.34);   // doppler düşüşü
    const g = this.ac.createGain(); g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.10, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.36);
    n.connect(f); f.connect(g); g.connect(this.master);
    n.start(t); n.stop(t+0.38);
  },

  // ==== TEMİZ SÜRÜŞ: yumuşak arpej ====
  temiz(){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    [523, 659, 784].forEach((fr,i)=>{
      const o = this.ac.createOscillator(); o.type='sine';
      o.frequency.value = fr;
      const g = this.ac.createGain(); g.gain.value=0.0001;
      const t0 = t + i*0.07;
      g.gain.exponentialRampToValueAtTime(0.055, t0+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+0.3);
      o.connect(g); g.connect(this.master); o.start(t0); o.stop(t0+0.32);
    });
  },

  // ==== KOMBO: seviyeye göre tizleşen çift nota ====
  kombo(sv){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    const n = Math.min(sv||1, 14);
    const tab = 392 * Math.pow(1.0595, n*2);       // her kombo ~2 yarım ton
    [tab, tab*1.5].forEach((fr,i)=>{               // beşli aralık = tatmin edici
      const o = this.ac.createOscillator(); o.type = i?'triangle':'square';
      o.frequency.value = fr;
      const fl = this.ac.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=3000;
      const g = this.ac.createGain(); g.gain.value=0.0001;
      g.gain.exponentialRampToValueAtTime(i?0.035:0.06, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
      o.connect(fl); fl.connect(g); g.connect(this.master);
      o.start(t); o.stop(t+0.22);
    });
  },

  // ==== ZAFER: yükselen akor ====
  zafer(){
    if(!this.acik) return;
    const t = this.ac.currentTime;
    [523, 659, 784, 1047].forEach((fr,i)=>{
      const o = this.ac.createOscillator(); o.type='triangle';
      o.frequency.value = fr;
      const g = this.ac.createGain(); g.gain.value=0.0001;
      const t0 = t + i*0.10;
      g.gain.exponentialRampToValueAtTime(0.07, t0+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+0.75);
      o.connect(g); g.connect(this.master); o.start(t0); o.stop(t0+0.8);
    });
  }
};

function bolgeIdx(m){
  const s = H.sinirlar;
  return m<s[0]?0 : m<s[1]?1 : m<s[2]?2 : 3;

function zonBlend(m){
  const idx = bolgeIdx(m);
  for(const s of H.sinirlar){

}

// pist eğrisi: seçilen haritanın viraj listesinden Float32Array üretir
function pistEgriUret(harita){
  const toplamSeg = Math.ceil(harita.mesafe/SEG) + 400;
  const arr = new Float32Array(toplamSeg);
  const viraj = (m0,m1,c)=>{
    const s0=m0/SEG|0, s1=m1/SEG|0, n=s1-s0;
    for(let i=s0;i<s1 && i<arr.length;i++){
      const t=(i-s0)/n;
      const e = t<0.25 ? t/0.25 : t>0.75 ? (1-t)/0.25 : 1;
      arr[i]=c*e;
    }
  };
  for(const [m0,m1,c] of harita.virajlar) viraj(m0,m1,c);
  return arr;
}

function idealTurSuresi(st, harita){
  // İyi oyuncu virajları temiz alır, nitroyu düzlüklerde patlatır → ortalama hız azaminin %52-64'ü.
  const azami = st.hiz;
  const ivmeBonus = Math.min(1, st.ivme/90);
  const nitroBonus = Math.min(1, st.nitro/90);
  const tutusBonus = Math.min(1, st.tutus/90);
  const ortOran = 0.52 + 0.06*ivmeBonus + 0.05*nitroBonus + 0.04*tutusBonus;
  const ortHizMs = (azami * ortOran) / 3.6;
  return harita.mesafe / (ortHizMs * 1.7);
}

async function yarisBaslat(haritaId){
  const harita = HARITALAR.find(h=>h.id===haritaId) || HARITALAR.find(h=>h.id===secilenHarita) || HARITALAR[0];
  secilenHarita = harita.id;
  const Z = ZORLUKLAR[secilenZorluk] || ZORLUKLAR.orta;
  H = {
    id:harita.id, MESAFE:harita.mesafe, TOPLAM_SEG:Math.ceil(harita.mesafe/SEG),
    bolgeler:harita.bolgeler, sinirlar:harita.sinirlar, hava:harita.hava, tema:harita.tema,
    renk:TEMA_RENK[harita.tema], pistEgri:pistEgriUret(harita),
    trafikYogunluk:harita.trafikYogunluk * Z.trafik,
    aiCarpan:harita.aiCarpan * Z.botHiz,
    pxSinir:Math.max(0.6, harita.pxSinir + Z.pxGevsek),
    gorusCarpan:harita.gorusCarpan,
    hasarCarp:Z.hasarCarp, odulCarp:Z.odulCarp, zorluk:secilenZorluk
  };
  ekranAc('yarisEkrani');
  $('bitisKaplama').classList.remove('goster');
  // bitiş ekranı butonlarını varsayılana döndür (turnuva bunları değiştiriyor)
  if(!turnuva || !turnuva.aktif){
    const bk = $('bitisButonlar');
    if(bk) bk.innerHTML = `<button class="btn" onclick="garajaDon()">Garaj</button>
      <button class="btn btn-ana" onclick="yarisBaslat()">Tekrar yarış</button>`;
  }
  tuvalBoyutla();
  const st = toplamStat(profil.secili);
  const lig = await ligYukle();
  const hayaletKaynak = lig.filter(k=>k.isim!==profil.isim).slice(0,3);
  // rakip isimleri (rastgele seçilir, "Bot" ön eki yok)
  const RAKIP_ISIMLER = ['Kemal','Ayşe','Deniz','Emre','Selin','Barış','Ceren','Onur','Merve','Tolga','Bahar','Serkan'];
  const havuz = RAKIP_ISIMLER.filter(n=>n!==(profil.isim||'').trim());
  for(let i=havuz.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [havuz[i],havuz[j]]=[havuz[j],havuz[i]]; }
  const botIsimleri = havuz.slice(0,3);
  const botModel = ['bogaz','tayfun','dogan'];
  // İDEAL SÜRE: oyuncunun arabasıyla mükemmel sürüş simülasyonu
  const idealSure = idealTurSuresi(st, harita);
  // aiCarpan: DÜŞÜK = HIZLI/agresif bot. Kolay~1.28, Orta~1.05, Zor~0.90
  const hedefTemel = idealSure * H.aiCarpan;
  // 3 bot kademesi (en iyisi hedefTemel'den biraz hızlı)
  const carp = [0.95, 1.03, 1.11];
  const hayaletler = hayaletKaynak.map((k,i)=>({
    isim:k.isim, hedefSure:Math.min(k.sure*H.aiCarpan, hedefTemel*carp[i%3]), mesafe:0,
    model:(ARABALAR.find(a=>a.ad===k.araba)||{id:'dogan'}).id,
    lat:[-0.55,0.55,0][i%3], faz:i*2.1,
    renk:['#4d7cff','#c084fc','#7bd94a'][i]
  }));
  let bi = 0;
  while(hayaletler.length < 3){
    hayaletler.push({
      isim:botIsimleri[bi], hedefSure:hedefTemel*carp[bi], mesafe:0, faz:bi*2.1,
      model:botModel[bi], lat:[-0.55,0.55,0][hayaletler.length%3], renk:['#4d7cff','#c084fc','#7bd94a'][hayaletler.length%3]
    });
    bi++;
  }
  oyun = {
    st, mesafe:0, hiz:0, sure:0, durum:'sayim',
    px:0, lean:0,
    nitroDolu:100, nitroAktif:false,
    trafik:[], sonTrafik:1.3/H.trafikYogunluk,
    hayaletler, carpTitre:0,
    sonBolge:-1, bolgeYazi:'', bolgeSure:0,
    parcaciklar:[], nitroFlash:0, sonGeecti:0,
    sira:1, sonSira:1, siraToastYazi:'', siraToastRenk:'', siraToastSure:0,
    sollamaTurbo:0, turboToast:0,
    kombo:0, komboSure:0, enYuksekKombo:0, komboFlash:0,
    yakinGecis:0, yakinToast:0, temizSure:0, temizToast:0,
    hasar:0, simsekSure:0, sonSimsek:4+Math.random()*5, yagmur:[]
  };
  if(H.hava==='yagmur'){
    for(let i=0;i<70;i++) oyun.yagmur.push({x:Math.random(), y:Math.random(), hiz:0.6+Math.random()*0.5, boy:14+Math.random()*22});
  }
  // BAŞLANGIÇ TRAFİĞİ: yolda hazır araçlar (oyuncu hemen sollamaya başlasın)
  {
    const n = H.trafikYogunluk > 1.3 ? 5 : 4;
    for(let i=0;i<n;i++){
      oyun.trafik.push({
        z: 90 + i*95 + Math.random()*45,           // 90m'den itibaren serpiştir
        x: [-0.62,-0.21,0.21,0.62][Math.floor(Math.random()*4)],
        hiz: (52+Math.random()*38)/3.6,
        model: ['sahin','dogan','generic','generic'][Math.floor(Math.random()*4)],
        renk: ['#8b94a8','#6b7385','#59617a','#7a8296','#4e5568'][Math.floor(Math.random()*5)],
        gecti:false
      });
    }
  }
  girdi = {sol:false, sag:false, nitro:false};
  Ses.baslat(); Ses.devam();
  let s = 3;
  $('geriSayim').classList.add('goster');
  $('geriSayimYazi').textContent = s;
  Ses.bip(false);
  const aralik = setInterval(()=>{
    s--;
    if(s>0){ $('geriSayimYazi').textContent = s; Ses.bip(false); }
    else if(s===0){ $('geriSayimYazi').textContent = 'BAS GAZA!'; Ses.bip(true); }
    else {
      clearInterval(aralik);
      $('geriSayim').classList.remove('goster');
      if(oyun) oyun.durum = 'yaris';
    }
  }, 800);
  sonZaman = performance.now();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(dongu);
}

function dongu(t){
  const dt = Math.min((t-sonZaman)/1000, 0.05);
  sonZaman = t;
  if(oyun) { guncelle(dt); ciz(); }
  animId = requestAnimationFrame(dongu);
}

function guncelle(dt){
  const o = oyun;
  if(o.durum!=='yaris' && o.durum!=='bitti') return;
  if(o.durum==='yaris'){
    o.sure += dt;
    const hasarCarpan = 1 - o.hasar*0.32;
    const islak = H.hava==='yagmur';
    const tutusEfektif = o.st.tutus * (islak?0.72:1);
    // sollama turbosu: kısa süreli hız+ivme artışı (süre azalır)
    o.sollamaTurbo = Math.max(0, (o.sollamaTurbo||0) - dt);
    const turboVar = o.sollamaTurbo > 0;
    const turboCarp = turboVar ? 1.07 : 1;      // %7 hız artışı (az bir şey)
    const turboIvme = turboVar ? 1.5 : 1;       // ivmelenme belirgin hissedilsin
    const maksMs = o.st.hiz/3.6 * (o.nitroAktif?1.25:1) * turboCarp * hasarCarpan;
    const ivmeMs = o.st.ivme/3.6 * (o.nitroAktif?2.2:1) * turboIvme * hasarCarpan;
    o.hiz = Math.min(o.hiz + ivmeMs*dt*2.2, maksMs);
    o.nitroAktif = girdi.nitro && o.nitroDolu>0;
    if(o.nitroAktif) o.nitroDolu = Math.max(0, o.nitroDolu - dt*(38 - o.st.nitro*0.18));
    o.mesafe += o.hiz*dt*1.7;
    // direksiyon
    const yon = (girdi.sag?1:0) - (girdi.sol?1:0);
    o.lean += (yon - o.lean)*Math.min(1, dt*7);
    const donus = 0.85 + tutusEfektif/130;
    o.px += yon * donus * dt * Math.min(1, o.hiz/14) * 1.35;
    // virajda merkezkaç kuvveti (yol tutuş direnir — ıslak zeminde daha az direnç)
    o.px -= egri(o.mesafe) * o.hiz * dt * (2.6/(1 + tutusEfektif/55));
    // sürüklenme dumanı (sert virajda)
    if(Math.abs(o.lean) > 0.55 && o.hiz > 12 && Math.random() < dt*10) surukDumani(o);
    // bariyer sürtünmesi (haritaya göre tolerans daha dar olabilir)
    const sinir = H.pxSinir;
    if(o.px > sinir){
      o.px = Math.min(o.px, sinir+0.16);
      o.hiz *= Math.max(0, 1 - 1.9*dt);
      o.carpTitre = Math.max(o.carpTitre, 0.1);
      o.hasar = Math.min(1, o.hasar + 0.02*H.hasarCarp);
      o.temizSure = 0; o.kombo = Math.floor((o.kombo||0)/2);
      if(Math.random() < dt*6) Ses.carp(0.45);   // hafif sürtünme
      kivilcim(o, 1);
    } else if(o.px < -sinir){
      o.px = Math.max(o.px, -sinir-0.16);
      o.hiz *= Math.max(0, 1 - 1.9*dt);
      o.carpTitre = Math.max(o.carpTitre, 0.1);
      o.hasar = Math.min(1, o.hasar + 0.02*H.hasarCarp);
      o.temizSure = 0; o.kombo = Math.floor((o.kombo||0)/2);
      if(Math.random() < dt*6) Ses.carp(0.45);   // hafif sürtünme
      kivilcim(o, -1);
    }
    // trafik üret (harita zorluğuna göre yoğunluk/sayı)
    const maxTrafik = H.trafikYogunluk > 1.3 ? 8 : H.trafikYogunluk > 1.05 ? 7 : 6;
    o.sonTrafik -= dt;
    if(o.sonTrafik<=0 && o.mesafe < H.MESAFE-350 && o.trafik.length < maxTrafik){
      o.sonTrafik = (1.3 + Math.random()*1.2) / H.trafikYogunluk;
      o.trafik.push({
        z: o.mesafe + 340 + Math.random()*220,
        x: [-0.62,-0.21,0.21,0.62][Math.floor(Math.random()*4)],
        hiz: (52+Math.random()*38)/3.6,
        model: ['sahin','dogan','generic','generic'][Math.floor(Math.random()*4)],
        renk: ['#8b94a8','#6b7385','#59617a','#7a8296','#4e5568'][Math.floor(Math.random()*5)],
        gecti:false
      });
    }
    for(const tr of o.trafik){
      tr.z += tr.hiz*dt*1.7;
      const dzm = tr.z - o.mesafe;
      if(dzm > -4 && dzm < 9 && Math.abs(tr.x - o.px) < 0.34){
        o.hiz *= 0.38; o.carpTitre = 0.45;
        o.hasar = Math.min(1, o.hasar + 0.09*H.hasarCarp);
        o.kombo = 0; o.komboSure = 0; o.temizSure = 0;   // KOMBO KIRILDI
        tr.z += 26; tr.gecti = true;
        Ses.carp(1.25);
        dumanPatla(o);
        if(navigator.vibrate) navigator.vibrate(80);
      }
      // sollama bonusu: TURBO + KOMBO
      if(!tr.gecti && dzm < -2){
        tr.gecti = true;
        o.sonGeecti = 0.9;
        // KOMBO: arka arkaya sollama → çarpan artar (çarpınca sıfırlanır)
        o.kombo = (o.kombo||0) + 1;
        o.komboSure = 7.0;                        // 7sn içinde tekrar sollamazsan düşer
        o.enYuksekKombo = Math.max(o.enYuksekKombo||0, o.kombo);
        const komboCarp = 1 + Math.min(0.8, o.kombo*0.09);   // kombo büyüdükçe turbo güçlenir
        o.sollamaTurbo = Math.min(2.2, (o.sollamaTurbo||0) + 0.85*komboCarp);
        o.nitroDolu = Math.min(100, o.nitroDolu + 5 + o.kombo*1.5);
        o.turboToast = 0.7;
        o.komboFlash = 0.5;
        // yakın geçiş (tehlikeli sollama) → ekstra ödül
        const yakinlik = Math.abs(tr.x - o.px);
        if(yakinlik < 0.42){
          o.yakinGecis = (o.yakinGecis||0) + 1;
          o.sollamaTurbo = Math.min(2.6, o.sollamaTurbo + 0.5);
          o.nitroDolu = Math.min(100, o.nitroDolu + 8);
          o.yakinToast = 0.8;
          Ses.yakin();
        } else Ses.kombo(o.kombo);
      }
    }
    o.trafik = o.trafik.filter(tr => tr.z > o.mesafe - 30 && tr.z < o.mesafe + 900);
    o.carpTitre = Math.max(0, o.carpTitre - dt);
    o.sonGeecti = Math.max(0, o.sonGeecti - dt);
    o.turboToast = Math.max(0, (o.turboToast||0) - dt);
    o.komboFlash = Math.max(0, (o.komboFlash||0) - dt*2);
    o.yakinToast = Math.max(0, (o.yakinToast||0) - dt);
    o.temizToast = Math.max(0, (o.temizToast||0) - dt);
    // kombo zaman aşımı
    if((o.kombo||0) > 0){
      o.komboSure = Math.max(0, (o.komboSure||0) - dt);
      if(o.komboSure <= 0) o.kombo = 0;
    }
    // TEMİZ SÜRÜŞ ödülü: 8sn çarpmadan → nitro dolumu
    o.temizSure = (o.temizSure||0) + dt;
    if(o.temizSure >= 8){
      o.temizSure = 0;
      o.nitroDolu = Math.min(100, o.nitroDolu + 14);
      o.temizToast = 1.0;
      Ses.temiz();
    }
    o.nitroFlash = o.nitroAktif ? Math.min(1, o.nitroFlash + dt*4) : Math.max(0, o.nitroFlash - dt*3);
    // parçacıkları ilerlet
    for(const p of o.parcaciklar){ p.omur -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; }
    o.parcaciklar = o.parcaciklar.filter(p => p.omur > 0).slice(-70);
    // yağmur damlaları
    if(H.hava==='yagmur'){
      for(const dm of o.yagmur){ dm.y += dm.hiz*dt*2.2; if(dm.y>1.15){ dm.y=-0.1; dm.x=Math.random(); } }
      o.simsekSure = Math.max(0, o.simsekSure - dt);
      o.sonSimsek -= dt;
      if(o.sonSimsek<=0){ o.simsekSure = 0.14; o.sonSimsek = 5+Math.random()*7; }
    }
    // MOTOR SESİ
    Ses.motor(Math.min(1, o.hiz/(o.st.hiz/3.6)), o.nitroAktif, o.lean, (H.hava==='yagmur'?0.5:0));
    // bölge duyurusu
    const bi = bolgeIdx(o.mesafe);
    if(bi !== o.sonBolge){
      o.sonBolge = bi;
      o.bolgeYazi = H.bolgeler[bi].ad;
      o.bolgeSure = 2.4;
    }
    o.bolgeSure = Math.max(0, o.bolgeSure - dt);
    // BOT AI: her botun KENDİ hız tavanı var (oyuncuya yapışmaz).
    // Böylece mükemmel süren oyuncu botu geçebilir; kötü süren geride kalır.
    for(const h of o.hayaletler){
      if(h.bitti) continue;
      if(h.tavanHiz === undefined){
        const idx = o.hayaletler.indexOf(h);
        // Oyuncunun ULAŞABİLECEĞİ en yüksek tempo referans alınır.
        // Kusursuz sürüş = maks hız + sürekli nitro (~1.25x) ama nitro sınırlı,
        // gerçekte sürdürülebilir tempo ~1.12x civarı.
        const oyuncuZirve = (o.st.hiz/3.6) * 1.12;
        // Zor: %99 → kusursuz sürüşle ancak geçilir (çok çekişmeli)
        // Orta: %92 → iyi sürüşle geçilir
        // Kolay: %80 → orta sürüşle rahat geçilir
        const zorOran = H.zorluk==='zor' ? 0.99 : H.zorluk==='orta' ? 0.92 : 0.80;
        const kademe = [0, -0.045, -0.09][idx] || 0;   // botlar arası fark
        h.tavanHiz = oyuncuZirve * (zorOran + kademe);
        h.faz = h.faz || idx*2.1;
        h.hizV = 0;
      }
      // bot kendi tavanına doğru ivmelenir (oyuncuyla AYNI ivme ölçeği: *2.2)
      const ivme = (o.st.ivme/3.6) * 2.2;
      // ritmik dalgalanma: virajlarda yavaşlar, düzlükte açar (canlı görünsün)
      const dalga = 1 + Math.sin(o.sure*0.55 + h.faz)*0.045;
      const hedef = h.tavanHiz * dalga;
      if(h.hizV < hedef) h.hizV = Math.min(hedef, h.hizV + ivme*dt);
      else               h.hizV = Math.max(hedef, h.hizV - ivme*dt*1.5);
      h.hizV = Math.max(0, h.hizV);
      h.mesafe = Math.min(H.MESAFE, h.mesafe + h.hizV*dt*1.7);
      if(h.mesafe>=H.MESAFE){ h.mesafe=H.MESAFE; h.bitti=true; h.bitisSure=o.sure; }
    }
    // canlı sıralama
    const yarisci = [{isim:null, mesafe:o.mesafe}, ...o.hayaletler.map(h=>({isim:h.isim, renk:h.renk, mesafe:h.mesafe}))];
    yarisci.sort((a,b)=>b.mesafe-a.mesafe);
    const yeniSira = yarisci.findIndex(r=>r.isim===null) + 1;
    if(yeniSira !== o.sonSira && o.sure > 0.5){
      if(yeniSira < o.sonSira){
        const gecilen = yarisci[yeniSira];
        o.siraToastYazi = (gecilen ? gecilen.isim+"'i" : '') + ' GEÇTİN! 🔥';
        o.siraToastRenk = '#2ee6c8'; Ses.bip(true);
      } else {
        const gecen = yarisci[yeniSira-2];
        o.siraToastYazi = (gecen ? gecen.isim : 'Rakip') + ' SENİ GEÇTİ!';
        o.siraToastRenk = '#ff4d5e'; Ses.bip(false);
      }
      o.siraToastSure = 1.8;
      o.sonSira = yeniSira;
    }
    o.sira = yeniSira;
    o.siraToastSure = Math.max(0, o.siraToastSure - dt);
    if(o.mesafe >= H.MESAFE){ o.mesafe = H.MESAFE; yarisBitti(); }
  } else {
    o.hiz = Math.max(0, o.hiz - 40*dt);
    Ses.sustur();
    for(const p of o.parcaciklar){ p.omur -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; }
    o.parcaciklar = o.parcaciklar.filter(p => p.omur > 0);
  }
}

// dünya-uzayı yerine ekran-uzayı parçacıklar (çizimde doğrudan kullanılır)
function kivilcim(o, taraf){
  for(let i=0;i<3;i++){
    o.parcaciklar.push({
      tip:'kivilcim', taraf,
      x:0, y:0, vx:taraf*(40+Math.random()*120), vy:-(60+Math.random()*140),
      g:520, omur:0.3+Math.random()*0.2, renk: Math.random()<0.5?'#ffd36b':'#ff8a3a', boy:1.5+Math.random()*2
    });
  }
}
function surukDumani(o){
  const taraf = o.lean>0?1:-1;
  o.parcaciklar.push({
    tip:'duman', x:taraf*20+(Math.random()-0.5)*10, y:-(Math.random()*8),
    vx:(Math.random()-0.5)*30, vy:-(15+Math.random()*25), g:-10,
    omur:0.4+Math.random()*0.3, boy:4+Math.random()*5
  });
}
function dumanPatla(o){
  for(let i=0;i<10;i++){
    o.parcaciklar.push({
      tip:'duman', x:(Math.random()-0.5)*40, y:-(Math.random()*30),
      vx:(Math.random()-0.5)*90, vy:-(30+Math.random()*80), g:-20,
      omur:0.5+Math.random()*0.4, boy:6+Math.random()*10
    });
  }
  for(let i=0;i<8;i++){
    o.parcaciklar.push({
      tip:'kivilcim', taraf:0, x:(Math.random()-0.5)*30, y:-(Math.random()*20),
      vx:(Math.random()-0.5)*220, vy:-(80+Math.random()*180), g:520,
      omur:0.3+Math.random()*0.2, renk:Math.random()<0.5?'#ffd36b':'#ff5a3a', boy:1.5+Math.random()*2.5
    });
  }
}

function konfetiPatlat(){
  const renkler = ['#ffb02e','#2ee6c8','#ff4d5e','#4d7cff','#c084fc','#f2f2f2'];
  const kap = $('bitisKaplama');
  for(let i=0;i<46;i++){
    const el = document.createElement('div');
    el.className = 'konfeti';
    el.style.left = (Math.random()*100)+'%';
    el.style.background = renkler[i%renkler.length];
    el.style.animationDuration = (1.6+Math.random()*1.6)+'s';
    el.style.animationDelay = (Math.random()*0.5)+'s';
    kap.appendChild(el);
    setTimeout(()=>el.remove(), 3600);
  }
}
async function yarisBitti(){
  const o = oyun;
  o.durum = 'bitti';
  const sure = o.sure;
  // sıralama: bitmiş botlardan bizden önce bitenleri say
  let siralama = 1;
  for(const h of o.hayaletler) if(h.bitti && h.bitisSure < sure) siralama++;
  const toplam = o.hayaletler.length + 1;
  // ---- ÖDÜL: temel + kombo bonusu + kıl payı bonusu ----
  const temelOdul = Math.max(150, (1800 - sure*8) + (toplam-siralama)*400);
  const komboBonus = (o.enYuksekKombo||0) * 120;          // en yüksek komboya göre
  const yakinBonus = (o.yakinGecis||0) * 60;              // her kıl payı geçiş
  const hasarCeza = Math.round(temelOdul * (o.hasar||0) * 0.35);   // hasarlı bitirme cezası
  const odul = Math.round(Math.max(100, (temelOdul + komboBonus + yakinBonus - hasarCeza)) * H.odulCarp);
  profil.para += odul;
  const rekor = await skorGonder(sure);
  await profilKaydet();
  const Z = ZORLUKLAR[H.zorluk] || ZORLUKLAR.orta;
  $('bitisBaslik').textContent = siralama===1 ? '🏆 1. SIRA!' : siralama+'. SIRA';
  $('bitisBaslik').style.color = siralama===1 ? 'var(--amber)' : 'var(--text)';
  const botDetay = o.hayaletler.map(h=>h.isim+': '+(h.bitti?sureYaz(h.bitisSure):'yolda')).join(' · ');
  // kazanç dökümü (oyuncu neyin karşılığını aldığını görsün)
  let dokum = `<div style="display:flex;justify-content:space-between;"><span style="color:var(--muted)">Yarış</span><span>₺${Math.round(temelOdul*H.odulCarp).toLocaleString('tr-TR')}</span></div>`;
  if(komboBonus>0) dokum += `<div style="display:flex;justify-content:space-between;color:#ffb02e;"><span>🔥 Kombo x${o.enYuksekKombo}</span><span>+₺${Math.round(komboBonus*H.odulCarp).toLocaleString('tr-TR')}</span></div>`;
  if(yakinBonus>0) dokum += `<div style="display:flex;justify-content:space-between;color:#2ee6c8;"><span>😱 Kıl payı ×${o.yakinGecis}</span><span>+₺${Math.round(yakinBonus*H.odulCarp).toLocaleString('tr-TR')}</span></div>`;
  if(hasarCeza>0) dokum += `<div style="display:flex;justify-content:space-between;color:#ff4d5e;"><span>🔧 Hasar %${Math.round(o.hasar*100)}</span><span>−₺${Math.round(hasarCeza*H.odulCarp).toLocaleString('tr-TR')}</span></div>`;
  $('bitisDetay').innerHTML =
    `<span style="color:${Z.renk};font-size:13px;font-weight:800;">${Z.ad} · ${siralama}/${toplam}</span><br>` +
    `Süre: <b style="color:var(--teal)">${sureYaz(sure)}</b>` +
    (rekor ? ' <span style="color:var(--amber)">— YENİ REKOR! 🌍</span>' : '') +
    `<div style="margin:8px auto;max-width:230px;font-size:12px;line-height:1.6;">${dokum}
       <div style="display:flex;justify-content:space-between;border-top:1px solid #2a3140;margin-top:4px;padding-top:4px;font-weight:800;">
         <span>Toplam</span><span style="color:var(--amber)">₺${odul.toLocaleString('tr-TR')}</span></div>
     </div>` +
    `<span style="color:var(--muted);font-size:11px;">${botDetay}</span>`;
  setTimeout(()=>{ $('bitisKaplama').classList.add('goster'); if(siralama===1){ konfetiPatlat(); Ses.zafer(); } }, 600);

  // ---- TURNUVA: puan ver, sonraki etap / final ----
  if(turnuva && turnuva.aktif){
    // bu etabın sıralamasını çıkar (oyuncu + botlar, süreye göre)
    const dizi = [{isim: profil.isim||'SEN', sure, ben:true}];
    for(const h of o.hayaletler) dizi.push({isim:h.isim, sure: h.bitti?h.bitisSure:9999, ben:false});
    dizi.sort((a,b)=>a.sure-b.sure);
    dizi.forEach((d,i)=>{
      const p = TURNUVA_PUAN[i] !== undefined ? TURNUVA_PUAN[i] : 1;
      turnuva.puanlar[d.isim] = (turnuva.puanlar[d.isim]||0) + p;
    });
    turnuva.gecmis.push({
      pist: HARITALAR.find(h=>h.id===TURNUVA_PISTLER[turnuva.etap])?.ad || '',
      sira: siralama, sure
    });
    turnuva.etap++;
    const bitti = turnuva.etap >= TURNUVA_PISTLER.length;
    // bitiş ekranı butonlarını turnuvaya göre değiştir
    const btnKutu = $('bitisButonlar');
    if(btnKutu){
      if(bitti){
        btnKutu.innerHTML = `<button class="btn btn-ana" onclick="turnuvaFinalGoster()">🏆 Şampiyonluk sonucu</button>`;
      } else {
        const sonraki = HARITALAR.find(h=>h.id===TURNUVA_PISTLER[turnuva.etap]);
        btnKutu.innerHTML =
          `<button class="btn" onclick="turnuvaIptal()">Çık</button>` +
          `<button class="btn btn-ana" onclick="turnuvaSonrakiEtap()">Sonraki: ${sonraki?sonraki.ad:''} →</button>`;
      }
    }
    // etap puan tablosunu bitiş detayına ekle
    const sirali = Object.entries(turnuva.puanlar).sort((a,b)=>b[1]-a[1]);
    const tablo = sirali.map(([isim,p],i)=>{
      const ben = isim===(profil.isim||'SEN');
      return `<div style="display:flex;justify-content:space-between;${ben?'color:var(--amber);font-weight:800;':'color:var(--muted);'}">
        <span>${i+1}. ${isim}</span><span>${p} p</span></div>`;
    }).join('');
    $('bitisDetay').innerHTML =
      `<div style="color:var(--teal);font-weight:800;font-size:13px;margin-bottom:4px;">TURNUVA · ETAP ${turnuva.etap}/${TURNUVA_PISTLER.length}</div>` +
      $('bitisDetay').innerHTML +
      `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #2a3140;font-size:12px;">
         <div style="font-weight:800;margin-bottom:3px;color:var(--text);">PUAN DURUMU</div>${tablo}</div>`;
  }
}

// turnuva: final tablosu
async function turnuvaFinalGoster(){
  if(!turnuva) return;
  const sirali = Object.entries(turnuva.puanlar).sort((a,b)=>b[1]-a[1]);
  const benim = profil.isim||'SEN';
  const yer = sirali.findIndex(([i])=>i===benim) + 1;
  const sampiyon = yer===1;
  // şampiyonluk ödülü
  const Z = ZORLUKLAR[turnuva.zorluk] || ZORLUKLAR.orta;
  const odul = Math.round((sampiyon ? 8000 : yer===2 ? 4000 : yer===3 ? 2000 : 800) * Z.odulCarp);
  profil.para += odul;
  await profilKaydet(); paraYaz();

  $('bitisBaslik').textContent = sampiyon ? '🏆 ŞAMPİYON!' : `${yer}. SIRA`;
  $('bitisBaslik').style.color = sampiyon ? 'var(--amber)' : 'var(--text)';
  const tablo = sirali.map(([isim,p],i)=>{
    const ben = isim===benim;
    const madalya = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    return `<div style="display:flex;justify-content:space-between;padding:3px 0;${ben?'color:var(--amber);font-weight:800;':''}">
      <span>${madalya} ${isim}</span><span>${p} puan</span></div>`;
  }).join('');
  const etaplar = turnuva.gecmis.map((g,i)=>
    `<div style="display:flex;justify-content:space-between;color:var(--muted);font-size:11px;">
      <span>${i+1}. ${g.pist}</span><span>${g.sira}. · ${sureYaz(g.sure)}</span></div>`).join('');
  $('bitisDetay').innerHTML =
    `<div style="color:var(--teal);font-weight:800;font-size:13px;">TURNUVA SONUCU · ${Z.ad}</div>
     <div style="margin:8px 0;font-size:14px;">${tablo}</div>
     <div style="margin-top:6px;padding-top:6px;border-top:1px solid #2a3140;">${etaplar}</div>
     <div style="margin-top:8px;">Ödül: <b style="color:var(--amber)">₺${odul.toLocaleString('tr-TR')}</b></div>`;
  const btnKutu = $('bitisButonlar');
  if(btnKutu) btnKutu.innerHTML =
    `<button class="btn" onclick="turnuvaIptal()">Garaj</button>` +
    `<button class="btn btn-ana" onclick="turnuvaBaslat('${turnuva.zorluk}')">Tekrar turnuva</button>`;
  if(sampiyon) konfetiPatlat();
  turnuva.aktif = false;
}
